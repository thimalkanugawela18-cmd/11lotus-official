<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>11LOTUS | Souls Sanctuary PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap');
        :root { --gold: #d4af37; --dark: #0b0b0b; --bubble-me: #d4af37; --bubble-you: #202020; --red: #ff4444; }
        
        body, html { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; }
        .active { display: flex !important; }

        /* Login & Setup UI */
        .container { background: rgba(20, 20, 20, 0.9); padding: 35px; border-radius: 20px; border: 1px solid var(--gold); width: 85%; max-width: 350px; text-align: center; margin: auto; box-shadow: 0 0 30px rgba(212, 175, 55, 0.15); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; border-radius: 8px; color: #fff; outline: none; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-family: 'Orbitron'; transition: 0.3s; }

        /* Chat Layout */
        header { width: 100%; padding: 12px 15px; background: #111; border-bottom: 1px solid rgba(212, 175, 55, 0.3); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: var(--dark); }
        
        /* Message Bubbles */
        .msg-container { position: relative; width: 100%; display: flex; flex-direction: column; transition: transform 0.2s; touch-action: pan-y; }
        .msg { max-width: 75%; padding: 10px; border-radius: 12px; font-size: 15px; position: relative; word-wrap: break-word; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.4); }
        @media (min-width: 768px) { .msg { max-width: 35%; } }
        .sent { align-self: flex-end; background: var(--bubble-me); color: #000; border-bottom-right-radius: 2px; }
        .rec { align-self: flex-start; background: var(--bubble-you); color: #fff; border-bottom-left-radius: 2px; }

        /* Reply View inside Message */
        .reply-in-msg { background: rgba(0,0,0,0.15); border-left: 3px solid var(--gold); padding: 5px 8px; margin-bottom: 5px; border-radius: 4px; font-size: 12px; opacity: 0.8; font-style: italic; }

        /* Reply Preview Bar above Input */
        #reply-preview-bar { display: none; background: #1a1a1a; padding: 8px 15px; border-top: 1px solid var(--gold); align-items: center; gap: 10px; }
        #reply-preview-bar span { flex: 1; font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Emoji Picker */
        #emoji-picker { display: none; position: absolute; bottom: 80px; left: 10px; background: #222; border: 1px solid var(--gold); border-radius: 10px; padding: 10px; width: 250px; grid-template-columns: repeat(6, 1fr); gap: 5px; z-index: 100; }
        .emoji-item { cursor: pointer; font-size: 20px; text-align: center; padding: 5px; }

        /* Input Area */
        .input-area { width: 100%; padding: 10px 15px; background: #181818; display: flex; align-items: center; gap: 10px; box-sizing: border-box; }
        #chat-input { flex: 1; padding: 10px 18px; background: #2a2a2a; border: none; border-radius: 25px; color: #fff; outline: none; font-size: 16px; }
        .icon-btn { color: var(--gold); font-size: 24px; cursor: pointer; background:none; border:none; }

        /* Context Menu */
        .msg-menu { display: none; position: absolute; background: #222; border: 1px solid var(--gold); border-radius: 8px; z-index: 2000; padding: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); min-width: 130px; }
        .menu-item { padding: 10px; font-size: 14px; cursor: pointer; color: white; }
        .menu-item:hover { background: var(--gold); color: #000; border-radius: 4px; }

        /* Care Buttons */
        .care-btn { border: 1px solid var(--gold); background: none; color: var(--gold); border-radius: 15px; padding: 5px 12px; font-size: 12px; margin: 5px 2px; cursor: pointer; }

        img, video { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }
        #nuke-gif { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:300px; z-index:999; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="container">
            <h1 style="font-family:'Orbitron'; color:var(--gold); letter-spacing:5px;">11LOTUS</h1>
            <input type="text" id="partner-id" placeholder="PARTNER ID">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="btn" onclick="handleAuth()">UNLOCK</button>
            <p onclick="showRecovery()" style="color:var(--gold); font-size:12px; cursor:pointer; margin-top:15px; text-decoration:underline;">Forgot Password?</p>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div class="container">
            <h2 style="color:var(--gold);">INITIALIZE</h2>
            <input type="password" id="new-pass" placeholder="New Password">
            <input type="text" id="personal-key" placeholder="Recovery Key (Secret)">
            <button class="btn" onclick="saveUser()">START</button>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <header>
            <button class="icon-btn" id="block-btn" onclick="toggleBlock()" style="font-size:11px; border:1px solid var(--gold); padding:4px 8px; border-radius:5px;">BLOCK</button>
            <div style="color:var(--gold); font-family:'Orbitron'; font-size:14px; letter-spacing:2px;">SANCTUARY</div>
            <button class="icon-btn" onclick="triggerNuclearBomb()">💣</button>
        </header>
        
        <div id="chat-window"></div>

        <div id="emoji-picker"></div>

        <div id="reply-preview-bar">
            <span id="reply-preview-text">Replying...</span>
            <button onclick="cancelReply()" style="background:none; border:none; color:var(--red); font-weight:bold;">X</button>
        </div>

        <div class="input-area" id="input-container">
            <span class="icon-btn" onclick="toggleEmojiPicker()">😊</span>
            <label class="icon-btn">📎<input type="file" id="file-in" hidden onchange="uploadMedia(this)"></label>
            <span class="icon-btn" id="mic-btn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice()" ontouchend="stopVoice()">🎙️</span>
            <input type="text" id="chat-input" placeholder="Whisper..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--gold); border:none; width:40px; height:40px; border-radius:50%; font-weight:bold;">></button>
        </div>

        <div id="msg-menu" class="msg-menu">
            <div class="menu-item" id="menu-reply-btn">↩️ Reply</div>
            <div class="menu-item" id="menu-del-everyone" style="color:var(--red);">🗑️ Delete for Everyone</div>
            <div class="menu-item" id="menu-del-me">🗑️ Delete for Me</div>
        </div>
    </div>

    <div id="recovery-modal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:5000; align-items:center; justify-content:center;">
        <div class="container">
            <h3 style="color:var(--gold);">RECOVERY</h3>
            <input type="text" id="recover-key-input" placeholder="SECRET KEY">
            <input type="password" id="new-password-input" placeholder="NEW PASSWORD" style="display:none;">
            <button class="btn" id="recovery-btn" onclick="verifyRecoveryKey()">VERIFY KEY</button>
            <button class="btn" style="background:none; color:#888;" onclick="this.parentElement.parentElement.style.display='none'">Cancel</button>
        </div>
    </div>

    <img id="nuke-gif" src="https://i.ibb.co/L5kR2Q0/explosion.gif">

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAj1BdBnNkVUhW7Cn6muBm6hmGG59l_RsQ",
            authDomain: "lotus-official-4c28b.firebaseapp.com",
            databaseURL: "https://lotus-official-4c28b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lotus-official-4c28b",
            storageBucket: "lotus-official-4c28b.appspot.com",
            messagingSenderId: "584674732018",
            appId: "1:584674732018:web:b6e5fa13708eac51512d6b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();
        let myPartnerID = "";
        let replyID = null, replyContent = "";
        let mediaRec, audioChunks = [];

        // Auth
        function handleAuth() {
            myPartnerID = document.getElementById('partner-id').value.trim();
            const p = document.getElementById('password').value;
            if(!myPartnerID) return alert("Enter ID");
            db.ref('users/'+myPartnerID).once('value', snap => {
                const u = snap.val();
                if(!u) showScreen('setup-screen');
                else if(u.password === p) startApp();
                else alert("Incorrect Password");
            });
        }
        function saveUser() {
            const p = document.getElementById('new-pass').value;
            const k = document.getElementById('personal-key').value;
            db.ref('users/'+myPartnerID).set({password:p, key:k}).then(startApp);
        }
        function startApp() { showScreen('chat-screen'); initEmoji(); loadMessages(); }

        // Recovery
        function showRecovery() { document.getElementById('recovery-modal').style.display='flex'; }
        function verifyRecoveryKey() {
            const id = document.getElementById('partner-id').value;
            const key = document.getElementById('recover-key-input').value;
            db.ref('users/'+id).once('value', s => {
                if(s.val() && s.val().key === key) {
                    document.getElementById('recover-key-input').style.display='none';
                    document.getElementById('new-password-input').style.display='block';
                    document.getElementById('recovery-btn').innerText="RESET PASSWORD";
                    document.getElementById('recovery-btn').onclick=resetPassword;
                } else alert("Invalid Key");
            });
        }
        function resetPassword() {
            const id = document.getElementById('partner-id').value;
            const np = document.getElementById('new-password-input').value;
            db.ref('users/'+id).update({password:np}).then(() => location.reload());
        }

        // Chat & Swipe Logic
        function loadMessages() {
            db.ref('chats/'+myPartnerID).on('value', snap => {
                const win = document.getElementById('chat-window');
                win.innerHTML = "";
                let lastT = 0;
                snap.forEach(child => {
                    const m = child.val();
                    if(m.status !== 'nuked' && m.status !== 'del_'+myPartnerID) {
                        const container = document.createElement('div');
                        container.className = "msg-container";
                        
                        // Swipe to Reply (Mobile)
                        let startX = 0;
                        container.ontouchstart = e => startX = e.touches[0].clientX;
                        container.ontouchend = e => { if(e.changedTouches[0].clientX - startX > 70) setReply(m.content, child.key); };

                        // Context Menu (Click)
                        container.onclick = e => {
                            e.stopPropagation();
                            const menu = document.getElementById('msg-menu');
                            menu.style.display = 'block';
                            menu.style.left = Math.min(e.pageX, window.innerWidth - 140) + "px";
                            menu.style.top = e.pageY + "px";
                            document.getElementById('menu-reply-btn').onclick = () => setReply(m.content, child.key);
                            document.getElementById('menu-del-me').onclick = () => { db.ref(`chats/${myPartnerID}/${child.key}`).update({status:'del_'+myPartnerID}); menu.style.display='none'; };
                            const delAll = document.getElementById('menu-del-everyone');
                            delAll.style.display = (m.sender==='me') ? 'block' : 'none';
                            delAll.onclick = () => { db.ref(`chats/${myPartnerID}/${child.key}`).update({status:'nuked'}); menu.style.display='none'; };
                        };

                        const div = document.createElement('div');
                        div.className = "msg " + (m.sender==='me' ? 'sent' : 'rec');
                        
                        let html = "";
                        if(m.replyTo) html += `<div class="reply-in-msg">Replied: ${m.replyTo}</div>`;
                        if(m.type==='text') html += m.content;
                        else if(m.type==='img') html += `<img src="${m.content}">`;
                        else if(m.type==='voice') html += `<audio src="${m.content}" controls></audio>`;
                        else if(m.type==='care_check') {
                            html += `<div>${m.content}</div>
                            <button class="care-btn" onclick="replyCare('I am good! 😊')">I'm Good</button>
                            <button class="care-btn" onclick="replyCare('I need a hug 🫂')">I need a hug</button>`;
                        }
                        div.innerHTML = html;
                        container.appendChild(div);
                        win.appendChild(container);
                        lastT = m.time;
                    }
                });
                win.scrollTop = win.scrollHeight;
                if(lastT > 0) checkInactivity(lastT);
            });
            db.ref('users/'+myPartnerID+'/blocked').on('value', s => {
                document.getElementById('input-container').style.display = s.val() ? "none" : "flex";
            });
        }

        function checkInactivity(lastT) {
            if(Date.now() - lastT > 4 * 24 * 60 * 60 * 1000) {
                const msg = "It's been a bit quiet here... Just wanted to check in on you. ❤️";
                db.ref('chats/'+myPartnerID).limitToLast(1).once('value', s => {
                    let last = ""; s.forEach(c => last = c.val().content);
                    if(last !== msg) pushToDB(msg, 'care_check', '11LOTUS');
                });
            }
        }

        function setReply(content, key) {
            replyID = key; replyContent = content;
            document.getElementById('reply-preview-bar').style.display = 'flex';
            document.getElementById('reply-preview-text').innerText = "Replying: " + content;
            document.getElementById('msg-menu').style.display = 'none';
        }
        function cancelReply() { replyID = null; document.getElementById('reply-preview-bar').style.display = 'none'; }

        function sendMsg() {
            const i = document.getElementById('chat-input');
            if(!i.value) return;
            db.ref('chats/'+myPartnerID).push({content:i.value, type:'text', sender:'me', time:Date.now(), status:'active', replyTo:replyID ? replyContent : null});
            i.value=""; cancelReply(); document.getElementById('emoji-picker').style.display='none';
        }
        function replyCare(txt) { pushToDB(txt, 'text', 'me'); setTimeout(()=>pushToDB(txt.includes('hug')?"🫂 Huge hug for you!":"🌿 Glad to hear!", 'text', '11LOTUS'), 1000); }

        function pushToDB(content, type, sender) { db.ref('chats/'+myPartnerID).push({content, type, sender, time:Date.now(), status:'active'}); }

        // Emoji & Media
        function initEmoji() {
            const p = document.getElementById('emoji-picker');
            ["❤️","👍","😂","😘","🔥","😊","🫂","✨","🙏","🧸"].forEach(e => {
                const s = document.createElement('span'); s.innerText = e; s.className="emoji-item";
                s.onclick = () => { document.getElementById('chat-input').value += e; p.style.display='none'; };
                p.appendChild(s);
            });
        }
        function toggleEmojiPicker() { const p = document.getElementById('emoji-picker'); p.style.display = (p.style.display==='grid')?'none':'grid'; }

        function uploadMedia(input) {
            const f = input.files[0]; if(!f) return;
            storage.ref(`media/${myPartnerID}/${Date.now()}`).put(f).then(s=>s.ref.getDownloadURL()).then(url=>pushToDB(url, f.type.startsWith('image')?'img':'vid', 'me'));
        }

        async function startVoice() {
            const s = await navigator.mediaDevices.getUserMedia({audio:true});
            mediaRec = new MediaRecorder(s); mediaRec.start();
            audioChunks=[]; document.getElementById('mic-btn').style.color='red';
            mediaRec.ondataavailable = e => audioChunks.push(e.data);
        }
        function stopVoice() {
            if(!mediaRec) return; mediaRec.stop();
            document.getElementById('mic-btn').style.color='var(--gold)';
            mediaRec.onstop = () => {
                const b = new Blob(audioChunks, {type:'audio/webm'});
                storage.ref(`voice/${myPartnerID}/${Date.now()}.webm`).put(b).then(s=>s.ref.getDownloadURL()).then(url=>pushToDB(url, 'voice', 'me'));
            };
        }

        function triggerNuclearBomb() {
            if(confirm("💣 Nuke your messages?")) {
                document.getElementById('nuke-gif').style.display='block';
                setTimeout(()=>document.getElementById('nuke-gif').style.display='none', 2000);
                db.ref('chats/'+myPartnerID).once('value', snap => {
                    snap.forEach(c => { if(c.val().sender==='me') db.ref(`chats/${myPartnerID}/${c.key}`).update({status:'nuked'}); });
                });
            }
        }
        function toggleBlock() { db.ref('users/'+myPartnerID).update({blocked: document.getElementById('block-btn').innerText==="BLOCK"}); }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        document.onclick = () => { document.getElementById('msg-menu').style.display='none'; };
    </script>
</body>
</html>
