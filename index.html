<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11LOTUS | Souls Sanctuary</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap');
        :root { --gold: #d4af37; --dark: #050505; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }
        .container { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); padding: 35px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3); width: 85%; max-width: 380px; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--gold); letter-spacing: 8px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; color: #fff; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn:hover { box-shadow: 0 0 20px var(--gold); }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="container">
            <h1>11LOTUS</h1>
            <input type="text" id="partner-id" placeholder="PARTNER ID">
            <input type="password" id="password" placeholder="SECRET PASSWORD">
            <button class="btn" onclick="authAction()">UNLOCK SANCTUARY</button>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div class="container">
            <h2 style="color:var(--gold);">INITIALIZE</h2>
            <input type="password" id="new-pass" placeholder="Set New Password">
            <input type="text" id="personal-key" placeholder="Recovery Key">
            <button class="btn" onclick="saveUserSetup()">SAVE & ENTER</button>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <h2 style="color:var(--gold);">WELCOME TO SANCTUARY</h2>
        <div id="chat-box" style="height: 300px; overflow-y: auto; width: 100%; border: 1px solid #333; margin: 20px 0; padding: 10px;"></div>
        <input type="text" id="msg-input" placeholder="Type a message...">
        <button class="btn" onclick="sendMsg()">SEND</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAj1BdBnNkVUhW7Cn6muBm6hmGG59l_RsQ",
            authDomain: "lotus-official-4c28b.firebaseapp.com",
            projectId: "lotus-official-4c28b",
            storageBucket: "lotus-official-4c28b.firebasestorage.app",
            messagingSenderId: "584674732018",
            appId: "1:584674732018:web:b6e5fa13708eac51512d6b"
        };

        // Firebase Initialize කරන කොට වැරැද්දක් වුණොත් දැනගන්න
        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.database();
            console.log("Firebase Connected Successfully!");
        } catch (e) {
            alert("Firebase Error: " + e.message);
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if(id) document.getElementById('partner-id').value = id;
        };

        function authAction() {
            const id = document.getElementById('partner-id').value;
            const pass = document.getElementById('password').value;
            if(!id || !pass) return alert("Please fill all fields");

            db.ref('users/' + id).once('value').then(snapshot => {
                const data = snapshot.val();
                if(!data) {
                    showScreen('setup-screen');
                } else if(data.password === pass) {
                    showScreen('chat-screen');
                } else {
                    alert("Incorrect Password!");
                }
            }).catch(e => alert("Database Error: " + e.message));
        }

        function saveUserSetup() {
            const id = document.getElementById('partner-id').value;
            const pass = document.getElementById('new-pass').value;
            const pKey = document.getElementById('personal-key').value;
            db.ref('users/' + id).set({ password: pass, personalKey: pKey })
              .then(() => showScreen('chat-screen'))
              .catch(e => alert(e.message));
        }

        function showScreen(sid) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(sid).classList.add('active');
        }
    </script>
</body>
</html>
