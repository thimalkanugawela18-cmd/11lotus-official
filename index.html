<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11LOTUS Sanctuary</title>
    <style>
        /* Gold & Black Theme Styles */
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --gray: #1a1a1a;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. Country Selection Overlay */
        #country-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--dark);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        #country-search {
            width: 85%;
            padding: 15px 20px;
            background: var(--gray);
            border: 1px solid var(--gold);
            color: white;
            border-radius: 30px;
            margin-bottom: 20px;
            font-size: 16px;
            outline: none;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        #country-list {
            width: 85%;
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #333;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .country-item {
            padding: 15px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: 0.2s;
        }

        .country-item:hover {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
        }

        /* 2. Main Chat Interface */
        header {
            background: #111;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--gold);
            position: relative;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .block-btn {
            position: absolute;
            right: 15px;
            top: 18px;
            background: #441111;
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 5px 10px;
            font-size: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--gray);
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: #777;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--gold);
            border-bottom: 3px solid var(--gold);
        }

        /* Messages Area */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: radial-gradient(circle, #111 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .msg {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .received { background: #222; align-self: flex-start; border-bottom-left-radius: 2px; }
        .sent { background: var(--gold); color: black; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Input Area */
        .input-box {
            padding: 15px;
            background: #111;
            display: flex;
            gap: 10px;
            border-top: 1px solid #222;
        }

        #user-msg {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 25px;
            outline: none;
        }

        .send-btn {
            background: var(--gold);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div id="country-overlay">
    <div class="logo" style="margin-bottom: 10px;">11LOTUS</div>
    <p style="color: #888; font-size: 14px;">Select your country to join a random circle of 30</p>
    <input type="text" id="country-search" placeholder="Search 195 countries..." onkeyup="filterCountries()">
    <div id="country-list"></div>
</div>

<header>
    <div id="active-title" class="logo">SOULMATE SANCTUARY</div>
    <button class="block-btn" onclick="handleBlock()">BLOCK</button>
</header>

<div class="tabs">
    <button id="soulmate-tab" class="tab-btn active" onclick="switchTab('private')">Soulmate</button>
    <button id="group-tab" class="tab-btn" onclick="switchTab('group')">Country Group</button>
</div>

<div id="chat-window">
    <div class="msg received">Welcome to your sanctuary. Your partner is online.</div>
</div>

<div class="input-box">
    <input type="text" id="user-msg" placeholder="Type a message...">
    <button class="send-btn" onclick="sendMsg()">></button>
</div>

<script>
    // 195 Countries List
    const countries = ["Afghanistan", "Albania", "Algeria", "Andorra", "Angola", "Antigua and Barbuda", "Argentina", "Armenia", "Australia", "Austria", "Azerbaijan", "Bahamas", "Bahrain", "Bangladesh", "Barbados", "Belarus", "Belgium", "Belize", "Benin", "Bhutan", "Bolivia", "Bosnia and Herzegovina", "Botswana", "Brazil", "Brunei", "Bulgaria", "Burkina Faso", "Burundi", "Cabo Verde", "Cambodia", "Cameroon", "Canada", "Central African Republic", "Chad", "Chile", "China", "Colombia", "Comoros", "Congo", "Costa Rica", "Croatia", "Cuba", "Cyprus", "Czech Republic", "Denmark", "Djibouti", "Dominica", "Dominican Republic", "Ecuador", "Egypt", "El Salvador", "Equatorial Guinea", "Eritrea", "Estonia", "Eswatini", "Ethiopia", "Fiji", "Finland", "France", "Gabon", "Gambia", "Georgia", "Germany", "Ghana", "Greece", "Grenada", "Guatemala", "Guinea", "Guyana", "Haiti", "Honduras", "Hungary", "Iceland", "India", "Indonesia", "Iran", "Iraq", "Ireland", "Israel", "Italy", "Jamaica", "Japan", "Jordan", "Kazakhstan", "Kenya", "Kiribati", "Kuwait", "Kyrgyzstan", "Laos", "Latvia", "Lebanon", "Lesotho", "Liberia", "Libya", "Liechtenstein", "Lithuania", "Luxembourg", "Madagascar", "Malawi", "Malaysia", "Maldives", "Mali", "Malta", "Marshall Islands", "Mauritania", "Mauritius", "Mexico", "Micronesia", "Moldova", "Monaco", "Mongolia", "Montenegro", "Morocco", "Mozambique", "Myanmar", "Namibia", "Nauru", "Nepal", "Netherlands", "New Zealand", "Nicaragua", "Niger", "Nigeria", "North Korea", "North Macedonia", "Norway", "Oman", "Pakistan", "Palau", "Palestine", "Panama", "Papua New Guinea", "Paraguay", "Peru", "Philippines", "Poland", "Portugal", "Qatar", "Romania", "Russia", "Rwanda", "Saint Kitts and Nevis", "Saint Lucia", "Samoa", "San Marino", "Saudi Arabia", "Senegal", "Serbia", "Seychelles", "Sierra Leone", "Singapore", "Slovakia", "Slovenia", "Solomon Islands", "Somalia", "South Africa", "South Korea", "South Sudan", "Spain", "Sri Lanka", "Sudan", "Suriname", "Sweden", "Switzerland", "Syria", "Taiwan", "Tajikistan", "Tanzania", "Thailand", "Timor-Leste", "Togo", "Tonga", "Trinidad and Tobago", "Tunisia", "Turkey", "Turkmenistan", "Tuvalu", "Uganda", "Ukraine", "United Arab Emirates", "United Kingdom", "United States", "Uruguay", "Uzbekistan", "Vanuatu", "Vatican City", "Venezuela", "Vietnam", "Yemen", "Zambia", "Zimbabwe"];

    let selectedCountry = "";

    function filterCountries() {
        const query = document.getElementById('country-search').value.toLowerCase();
        const list = document.getElementById('country-list');
        list.innerHTML = "";
        
        countries.filter(c => c.toLowerCase().includes(query)).forEach(country => {
            const div = document.createElement('div');
            div.className = "country-item";
            div.innerText = country;
            div.onclick = () => selectCountry(country);
            list.appendChild(div);
        });
    }

    function selectCountry(country) {
        selectedCountry = country;
        document.getElementById('country-overlay').style.display = 'none';
        document.getElementById('group-tab').innerText = country + " Group";
    }

    function switchTab(type) {
        const title = document.getElementById('active-title');
        const sTab = document.getElementById('soulmate-tab');
        const gTab = document.getElementById('group-tab');
        const win = document.getElementById('chat-window');

        if(type === 'private') {
            title.innerText = "SOULMATE SANCTUARY";
            sTab.classList.add('active');
            gTab.classList.remove('active');
            win.innerHTML = '<div class="msg received">Private Session: Only you and your partner can see this.</div>';
        } else {
            title.innerText = selectedCountry.toUpperCase() + " CIRCLE #01";
            gTab.classList.add('active');
            sTab.classList.remove('active');
            win.innerHTML = `<div class="msg received">Welcome to ${selectedCountry} Group! Say hi to the other 29 members.</div>`;
        }
    }

    function sendMsg() {
        const input = document.getElementById('user-msg');
        if(input.value.trim() !== "") {
            const win = document.getElementById('chat-window');
            const msg = document.createElement('div');
            msg.className = "msg sent";
            msg.innerText = input.value;
            win.appendChild(msg);
            input.value = "";
            win.scrollTop = win.scrollHeight;
        }
    }

    function handleBlock() {
        const btn = document.querySelector('.block-btn');
        if(btn.innerText === "BLOCK") {
            if(confirm("Are you sure you want to block this partner?")) {
                btn.innerText = "UNBLOCK";
                btn.style.background = "#114411";
                btn.style.color = "#44ff44";
                btn.style.borderColor = "#44ff44";
                alert("Partner blocked.");
            }
        } else {
            btn.innerText = "BLOCK";
            btn.style.background = "#441111";
            btn.style.color = "#ff4444";
            btn.style.borderColor = "#ff4444";
            alert("Partner unblocked.");
        }
    }

    // Initialize list
    filterCountries();
</script>

</body>
</html>
