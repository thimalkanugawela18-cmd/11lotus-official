<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11LOTUS | Digital Sanctuary</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap');

        :root { --gold: #d4af37; --dark: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }

        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        /* Futuristic Container */
        .container { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3); text-align: center; width: 90%; max-width: 350px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--gold); letter-spacing: 12px; margin-bottom: 30px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.6); }

        input { width: 100%; padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; color: #fff; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.1); box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }

        .btn { width: 100%; padding: 15px; margin-top: 20px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn:hover { box-shadow: 0 0 25px rgba(212, 175, 55, 0.8); transform: translateY(-2px); }

        /* Chat Layout */
        header { width: 100%; padding: 15px; background: #111; border-bottom: 1px solid var(--gold); text-align: center; position: sticky; top: 0; }
        #chat-window { flex: 1; width: 100%; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; }
        .msg { max-width: 75%; padding: 12px; border-radius: 15px; font-size: 15px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--gold); color: #000; border-bottom-right-radius: 2px; }
        .rec { align-self: flex-start; background: #222; color: #fff; border-bottom-left-radius: 2px; }
        
        .input-area { width: 100%; padding: 15px; background: #111; display: flex; gap: 10px; box-sizing: border-box; }
        .forgot { display: block; margin-top: 20px; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="container">
            <h1>11LOTUS</h1>
            <div id="status-msg" style="font-size: 10px; color: var(--gold); margin-bottom: 10px;">SECURE CONNECTION IDLE</div>
            <input type="text" id="partner-id" placeholder="PARTNER ID">
            <input type="password" id="password" placeholder="SECRET PASSWORD">
            <button class="btn" onclick="handleAuth()">Unlock Sanctuary</button>
            <p class="forgot" onclick="resetFlow()">Lost access to sanctuary?</p>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div class="container">
            <h2 style="color:var(--gold); font-family:'Orbitron';">INITIALIZE</h2>
            <p style="font-size:12px; color:#888;">Create a password and recovery key for this doll.</p>
            <input type="password" id="new-pass" placeholder="Set Password">
            <input type="text" id="personal-key" placeholder="Personal Recovery Key">
            <button class="btn" onclick="saveNewUser()">SAVE & ENTER</button>
        </div>
    </div>

    <div id="chat-screen" class="screen" style="justify-content: flex-start;">
        <header><h2 style="color:var(--gold); margin:0; font-family:'Orbitron'; font-size:18px; letter-spacing:4px;">SANCTUARY</h2></header>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="chat-input" style="margin:0;" placeholder="Whisper something...">
            <button onclick="sendMessage()" style="width:60px; background:var(--gold); border:none; border-radius:8px; font-weight:bold;">></button>
        </div>
    </div>

    <script>
        // --- YOUR FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAj1BdBnNkVUhW7Cn6muBm6hmGG59l_RsQ",
            authDomain: "lotus-official-4c28b.firebaseapp.com",
            projectId: "lotus-official-4c28b",
            storageBucket: "lotus-official-4c28b.firebasestorage.app",
            messagingSenderId: "584674732018",
            appId: "1:584674732018:web:b6e5fa13708eac51512d6b",
            measurementId: "G-XWNZJKR323"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const MASTER_KEY = "BOX-11L-2026"; // Box එකේ ගහන Master Key එක

        // URL එකෙන් ID එක auto-fill කිරීම
        window.onload = function() {
            const id = new URLSearchParams(window.location.search).get('id');
            if(id) {
                document.getElementById('partner-id').value = id;
                document.getElementById('status-msg').innerText = "ID RECOGNIZED: " + id;
            }
        };

        function handleAuth() {
            const id = document.getElementById('partner-id').value;
            const pass = document.getElementById('password').value;
            if(!id || !pass) return alert("Fill all fields");

            db.ref('users/' + id).once('value', snap => {
                const data = snap.val();
                if(!data) {
                    showScreen('setup-screen'); // පළමු වතාව
                } else if(data.password === pass) {
                    startChat(id);
                } else {
                    alert("Incorrect Password!");
                }
            });
        }

        function saveNewUser() {
            const id = document.getElementById('partner-id').value;
            const pass = document.getElementById('new-pass').value;
            const pKey = document.getElementById('personal-key').value;
            if(!pass || !pKey) return alert("Fill fields");

            db.ref('users/' + id).set({
                password: pass,
                personalKey: pKey
            }).then(() => startChat(id));
        }

        function sendMessage() {
            const id = document.getElementById('partner-id').value;
            const text = document.getElementById('chat-input').value;
            if(!text) return;

            db.ref('chats/' + id).push({
                text: text,
                sender: 'me',
                time: Date.now()
            });
            document.getElementById('chat-input').value = "";
        }

        function startChat(id) {
            showScreen('chat-screen');
            db.ref('chats/' + id).on('child_added', snap => {
                const m = snap.val();
                const div = document.createElement('div');
                div.className = "msg " + (m.sender === 'me' ? 'sent' : 'rec');
                div.innerText = m.text;
                document.getElementById('chat-window').appendChild(div);
                document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            });
        }

        function resetFlow() {
            const id = document.getElementById('partner-id').value;
            if(!id) return alert("Enter ID first");
            const key = prompt("Enter Personal Key or Box Master Key:");
            db.ref('users/' + id).once('value', snap => {
                const data = snap.val();
                if(data && (key === data.personalKey || key === MASTER_KEY)) {
                    const newP = prompt("Verified! Enter New Password:");
                    db.ref('users/' + id).update({password: newP});
                    alert("Success!");
                } else { alert("Invalid Key"); }
            });
        }

        function showScreen(sid) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(sid).classList.add('active');
        }
    </script>
</body>
</html>
