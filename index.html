<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11LOTUS | Souls Sanctuary</title>
    <style>
        :root {
            --bg-color: #0b141a;
            --header-color: #202c33;
            --my-msg: #005c4b;
            --text-white: #e9edef;
            --accent-green: #00a884;
            --danger: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { background-color: #121212; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* Main Website Container */
        .web-container {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        /* 1. Global Loading Spinner Overlay */
        .loader-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #222;
            border-top: 5px solid var(--accent-green); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 2. Header Area (Status & Controls) */
        header {
            background: var(--header-color);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a3942;
        }
        .user-info b { display: block; color: var(--text-white); font-size: 17px; }
        .user-info span { color: var(--danger); font-size: 12px; font-weight: bold; } /* 4 Day Log Status */

        .btn-grp button {
            padding: 7px 12px; border-radius: 6px; border: none; font-size: 11px;
            font-weight: bold; cursor: pointer; margin-left: 5px; transition: 0.3s;
        }
        .nuke-btn { background: var(--danger); color: white; }
        .block-btn { background: #3b3b3b; color: white; }

        /* 3. Chat Area */
        .chat-box {
            flex: 1; padding: 20px; overflow-y: auto;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }
        .msg {
            background: var(--my-msg); color: var(--text-white);
            padding: 10px 15px; border-radius: 10px; margin-bottom: 15px;
            max-width: 85%; align-self: flex-end; position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .msg.deleted { background: #1d282f !important; color: #8696a0 !important; font-style: italic; border: 1px solid #333; }
        .delete-link {
            display: block; font-size: 10px; color: #ffb1b1; 
            margin-top: 8px; cursor: pointer; text-decoration: none;
        }

        /* 4. Footer Input Bar */
        footer {
            background: var(--header-color);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .input-wrap { flex: 1; background: #2a3942; border-radius: 25px; padding: 10px 15px; display: flex; align-items: center; }
        .input-wrap input { flex: 1; background: transparent; border: none; color: white; outline: none; margin: 0 10px; }
        .icon { font-size: 22px; color: #8696a0; cursor: pointer; }
    </style>
</head>
<body>

<div class="web-container">
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <p id="loader-status" style="color: #00a884; margin-top: 20px; font-size: 14px;">Action in progress...</p>
    </div>

    <header>
        <div class="user-info">
            <b>11LOTUS Souls Sanctuary</b>
            <span>Active: 4 days ago</span> </div>
        <div class="btn-grp">
            <button id="blockBtn" class="block-btn" onclick="triggerAction('block')">Block</button>
            <button class="nuke-btn" onclick="triggerAction('nuke')">NUKE 💣</button>
        </div>
    </header>

    <div class="chat-box" id="chatWindow">
        <div class="msg" id="msg1">
            <span>Welcome back to your Sanctuary. I've been waiting.</span>
            <a class="delete-link" onclick="deleteEveryone('msg1')">Delete for Everyone</a>
        </div>
    </div>

    <footer>
        <span class="icon">😊</span> <div class="input-wrap">
            <span class="icon" onclick="document.getElementById('fileIn').click()">📎</span> <input type="file" id="fileIn" hidden onchange="triggerAction('media')">
            <input type="text" id="msgText" placeholder="Message your soul...">
        </div>
        <span class="icon" style="color: var(--accent-green);" onclick="sendMsg()">➤</span>
    </footer>
</div>

<script>
    let blocked = false;

    // Loader Function
    function startLoader(txt) {
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('loader-status').innerText = txt;
    }
    function stopLoader() {
        document.getElementById('loader').style.display = 'none';
    }

    // Delete for Everyone Logic
    function deleteEveryone(id) {
        startLoader("Deleting for everyone...");
        setTimeout(() => {
            let msg = document.getElementById(id);
            msg.innerHTML = "🚫 This message was deleted";
            msg.classList.add('deleted');
            stopLoader();
        }, 1300);
    }

    // General Actions (Block, Nuke, Media)
    function triggerAction(type) {
        if(type === 'block') {
            startLoader(blocked ? "Unblocking..." : "Blocking User...");
            setTimeout(() => {
                blocked = !blocked;
                document.getElementById('blockBtn').innerText = blocked ? "Unblock" : "Block";
                document.getElementById('blockBtn').style.background = blocked ? "#00a884" : "#3b3b3b";
                stopLoader();
            }, 1200);
        } else if(type === 'nuke') {
            if(confirm("Confirm Nuclear Deployment? සියලුම දත්ත විනාශ වනු ඇත!")) {
                startLoader("NUCLEAR BOMB DEPLOYING... ☢️");
                setTimeout(() => {
                    document.getElementById('chatWindow').innerHTML = "<p style='text-align:center; color:#8696a0; margin-top:50px;'>Chat History Wiped.</p>";
                    stopLoader();
                }, 2500);
            }
        } else if(type === 'media') {
            startLoader("Processing Media File...");
            setTimeout(() => {
                stopLoader();
                alert("Media attached successfully!");
            }, 2000);
        }
    }

    // Send Message Logic
    function sendMsg() {
        let input = document.getElementById('msgText');
        if(input.value.trim() !== "") {
            let chat = document.getElementById('chatWindow');
            let div = document.createElement('div');
            div.className = 'msg';
            div.innerText = input.value;
            chat.appendChild(div);
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
        }
    }
</script>

</body>
</html>
