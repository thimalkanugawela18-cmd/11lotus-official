<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11LOTUS | Souls Sanctuary</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b141a; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* Main Container */
        .chat-card {
            width: 350px; height: 85vh; background: #111b21;
            border-radius: 15px; border: 1px solid #333;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Header Area */
        .header { background: #202c33; padding: 15px; border-radius: 15px 15px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .user-info b { display: block; font-size: 16px; color: #e9edef; }
        .user-info span { color: #ff4b2b; font-size: 11px; font-weight: bold; } /* 4 DAY STATUS */

        /* Chat Area */
        .chat-window { flex: 1; padding: 20px; overflow-y: auto; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .msg { background: #005c4b; padding: 12px; border-radius: 8px; margin-bottom: 15px; max-width: 85%; position: relative; font-size: 14px; }
        .msg.deleted { background: #1d282f !important; color: #8696a0 !important; font-style: italic; border: 1px solid #333; }
        .del-link { color: #ffb1b1; font-size: 10px; cursor: pointer; text-decoration: underline; display: block; margin-top: 8px; }

        /* Loading Spinner */
        .spinner {
            width: 35px; height: 35px; border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #00a884; border-radius: 50%;
            animation: spin 1s linear infinite; display: none; margin: 15px auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Buttons */
        .btn-group { padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        button { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; }
        .nuke-btn { background: #ff3b30; color: white; }
        .block-btn { background: #3b3b3b; color: white; }

        /* Footer Icons */
        .footer { background: #202c33; padding: 10px; text-align: center; font-size: 20px; color: #8696a0; }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="header">
        <div class="user-info">
            <b>11LOTUS Soul</b>
            <span>Active: 4 days ago</span>
        </div>
    </div>

    <div class="chat-window" id="chat">
        <div class="msg" id="m1">
            <span id="txt1">Meka delete karapan hutto!</span>
            <span class="del-link" id="link1" onclick="deleteEveryone('m1')">Delete for Everyone</span>
        </div>
    </div>

    <div id="loader" class="spinner"></div>

    <div class="btn-group">
        <button id="blockBtn" class="block-btn" onclick="toggleBlock()">Block User</button>
        <button class="nuke-btn" onclick="nukeBomb()">NUKE BOMB 💣</button>
    </div>

    <div class="footer">
        😊 &nbsp;&nbsp; 📎
    </div>
</div>

<script>
    const loader = document.getElementById('loader');

    function showLoader() { loader.style.display = "block"; }
    function hideLoader() { loader.style.display = "none"; }

    // 1. Delete for Everyone Logic
    function deleteEveryone(id) {
        showLoader();
        const msg = document.getElementById(id);
        const link = msg.querySelector('.del-link');
        
        setTimeout(() => {
            msg.innerHTML = "🚫 This message was deleted";
            msg.classList.add('deleted');
            hideLoader();
        }, 1500);
    }

    // 2. Block/Unblock Logic
    function toggleBlock() {
        showLoader();
        const btn = document.getElementById('blockBtn');
        setTimeout(() => {
            if(btn.innerText === "Block User") {
                btn.innerText = "Unblock";
                btn.style.background = "#00a884";
            } else {
                btn.innerText = "Block User";
                btn.style.background = "#3b3b3b";
            }
            hideLoader();
        }, 1200);
    }

    // 3. Nuke Bomb Logic
    function nukeBomb() {
        if(confirm("Confirm Nuke? Okkoma clear wei!")) {
            showLoader();
            setTimeout(() => {
                document.getElementById('chat').innerHTML = "<p style='text-align:center; color:grey; margin-top:20px;'>Sanctuary Cleared ☢️</p>";
                hideLoader();
            }, 2500);
        }
    }
</script>

</body>
</html>
