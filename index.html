<html lang="en">
<head>

  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    :root {

      --dark: #0b0b0b;
      --bubble-me: #d4af37;
      --bubble-you: #202020;
      --blue: #4fc3f7;
      --soft-line: rgba(255,255,255,0.08);
      --app-height: 100vh;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--dark);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      min-height: var(--app-height);
    }

    .screen {
      display: none;
      width: 100%;
      height: var(--app-height);
      min-height: var(--app-height);
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .active { display: flex !important; }

    .container {
      background: rgba(20, 20, 20, 0.95);
      padding: 35px;
      border-radius: 20px;
      border: 1px solid var(--gold);
      width: 85%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.18);

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #222;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      outline: none;
      font-size: 16px;
      font-family: inherit;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      margin-top: 10px;
    }

    #chat-screen {
      justify-content: flex-start;
      align-items: stretch;
      height: var(--app-height);
      min-height: var(--app-height);
      overflow: hidden;
    }

    header,
    #reply-bar,
    .rabbit-bar,
    .blocked-banner,
    .input-area {
      flex-shrink: 0;
    }

    header {
      width: 100%;
      padding: 12px 15px;
      background: #111;
      border-bottom: 1px solid rgba(212, 175, 55, 0.25);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #chat-window {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-blend-mode: overlay;
      background-color: var(--dark);
    }

    .msg-wrap {
      display: flex;
      flex-direction: column;
      width: 100%;
      position: relative;
      touch-action: pan-y;
      transition: transform 0.18s ease;
    }

    .reply-swipe-indicator {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      color: var(--gold);
      z-index: 1;
    }

    .sent-wrap .reply-swipe-indicator {
      right: 92px;
    }

    .rec-wrap .reply-swipe-indicator {
      left: 92px;
    }

    .msg {
      max-width: 80%;
      padding: 8px 12px 6px;
      border-radius: 14px;
      font-size: 15px;
      position: relative;
      word-wrap: break-word;
      line-height: 1.4;
      cursor: pointer;
      z-index: 2;
    }

    .sent {
      align-self: flex-end;
      background: var(--bubble-me);
      color: #000;
      border-bottom-right-radius: 3px;
    }

    .rec {
      align-self: flex-start;
      background: var(--bubble-you);
      color: #fff;
      border-bottom-left-radius: 3px;
    }

    .msg img,
    .msg video {
      max-width: 230px !important;
      width: 100%;
      height: auto;
      border-radius: 10px;
      display: block;
      margin: 4px 0;
      border: 1px solid rgba(255,255,255,0.08);
      background: #000;
    }

    @media (max-width: 480px) {
      .msg img,
      .msg video {
        max-width: 190px !important;
      }
      .sent-wrap .reply-swipe-indicator {
        right: 74px;
      }
      .rec-wrap .reply-swipe-indicator {
        left: 74px;
      }

      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,0.12);
      margin-top: 4px;
    }

    .play-mini {

      height: 38px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.25);
      color: inherit;
      cursor: pointer;
      font-size: 15px;

    .msg audio {

      max-width: 100%;
      margin-top: 4px;
    }

    .reply-ctx {

      padding: 4px 8px;
      margin-bottom: 6px;
      border-radius: 4px;
      font-size: 12px;
      opacity: 0.9;

    .msg-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      min-height: 14px;
    }

    .msg-time {
      font-size: 11px;
      opacity: 0.75;
    }

    .status-tick {
      font-size: 11px;
      opacity: 0.75;
    }

    .seen-tick {
      color: var(--blue);
      opacity: 1;
    }

    #reply-bar {
      display: none;
      background: #1a1a1a;
      padding: 8px 15px;
      border-top: 1px solid rgba(212,175,55,0.4);
      align-items: center;
      gap: 10px;
      flex-shrink: 0;

    #reply-txt {

    .rabbit-bar {

      position: fixed;

      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.38);

      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .sheet-btn {
      width: 100%;
      padding: 15px;
      border: none;
      background: #111;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sheet-btn:last-child { border-bottom: none; }
    .sheet-btn.gold { color: #f5c84c; }
    .sheet-btn.danger { color: #ff5b5b; }

    .deleted-msg {
      font-style: italic;
      opacity: 0.78;
      display: flex;
      align-items: center;
      gap: 6px;

    .deleted-bubble-me {
      background: #ccb96f !important;

    .deleted-bubble-other {

    .img-box {
      position: relative;

    .upload-preview-bubble {

    .upload-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .circle-wrap {
      width: 68px;
      height: 68px;
      position: relative;
      background: rgba(0,0,0,0.42);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .circle-svg {
      width: 68px;
      height: 68px;
      transform: rotate(-90deg);
      position: absolute;
      top: 0;
      left: 0;
    }

    .circle-bg {
      fill: none;
      stroke: rgba(255,255,255,0.25);
      stroke-width: 6;
    }

    .circle-progress {
      fill: none;
      stroke: var(--gold);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 188.5;
      stroke-dashoffset: 188.5;
      transition: stroke-dashoffset 0.2s linear;
    }

    .circle-text {
      position: relative;
      z-index: 2;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .tiny-progress {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.16);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .tiny-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--gold);
      transition: width 0.2s linear;
    }

    .tiny-upload-info {
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      opacity: 0.8;

    .recording-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #ff4d4d;
      border-radius: 50%;
      margin-right: 6px;
      animation: blink 1s infinite;

    @keyframes blink {

    .care-btn {
      border: 1px solid var(--gold);
      background: none;
      color: var(--gold);
      border-radius: 15px;
      padding: 5px 12px;
      font-size: 12px;
      margin-top: 8px;
      cursor: pointer;
    }

    .msg-link {
      color: inherit;
      text-decoration: underline;
      word-break: break-all;
    }
  </style>
</head>

    function formatTime(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      let h = d.getHours();
      const m = String(d.getMinutes()).padStart(2, "0");
      const ampm = h >= 12 ? "PM" : "AM";
      h = h % 12;
      h = h ? h : 12;
      return `${h}:${m} ${ampm}`;
    }

    function formatBytes(bytes) {
      if (!bytes && bytes !== 0) return "";
      if (bytes === 0) return "0 Bytes";
      const sizes = ["Bytes", "KB", "MB", "GB"];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      const value = bytes / Math.pow(1024, i);
      return value.toFixed(i === 0 ? 0 : 2) + " " + sizes[i];
    }

    function getTickMarkup(seen, delivered = true) {
      if (!delivered) return `<span class="status-tick">🕓</span>`;
      return `<span class="status-tick ${seen ? 'seen-tick' : ''}">${seen ? '✓✓' : '✓'}</span>`;
    }

    function getLocalDeleteMap() {
      try {
        return JSON.parse(localStorage.getItem(deletedLocalPrefix + myPartnerID) || "{}");
      } catch {
        return {};
      }
    }

    function setLocalDeleted(messageId) {
      const map = getLocalDeleteMap();
      map[messageId] = true;
      localStorage.setItem(deletedLocalPrefix + myPartnerID, JSON.stringify(map));
    }

    function isLocallyDeleted(messageId) {
      const map = getLocalDeleteMap();
      return !!map[messageId];
    }

    function linkify(text) {
      const safe = esc(text || "");
      return safe.replace(

      const rawId = document.getElementById('partner-id').value.trim();
      const password = document.getElementById('password').value;

      if (!rawId) return alert("Enter Partner ID");
      if (!password) return alert("Enter Password");

      myPartnerID = sanitizeKey(rawId);

      db.ref('users/' + myPartnerID).once('value')
        .then(snap => {
          const u = snap.val();
          if (!u) {
            showScreen('setup-screen');
          } else if (u.password === password) {
            showScreen('chat-screen');
            bindSettings();
            loadMessages();
          } else {
            alert("Wrong Password");
          }
        })
        .catch(err => {
          console.error(err);
          alert("Login error: " + err.message);
        });
    }

      const p = document.getElementById('new-pass').value.trim();
      const k = document.getElementById('personal-key').value.trim();

      if (!myPartnerID) return alert("Enter Partner ID first");
      if (!p || !k) return alert("Fill all fields");

      db.ref('users/' + myPartnerID).set({
        password: p,
        key: k,
        blocked: false
      }).then(() => {

    function loadMessages() {
      const win = document.getElementById('chat-window');

      if (chatRef) chatRef.off();

      chatRef = db.ref('chats/' + myPartnerID);

      chatRef.on('value', snap => {
        win.innerHTML = "";
        let lastT = 0;
        let hasCareCheck = false;

        snap.forEach(child => {
          const m = child.val();
          const msgId = child.key;

          if (!m) return;
          if (isLocallyDeleted(msgId)) return;

          if (m.sender !== 'me' && !m.seen && !m.deletedForEveryone) {
            db.ref(`chats/${myPartnerID}/${msgId}`).update({ seen: true });
          }

          const wrap = document.createElement('div');
          wrap.className = 'msg-wrap ' + (m.sender === 'me' ? 'sent-wrap' : 'rec-wrap');

          const swipeIcon = document.createElement('div');
          swipeIcon.className = 'reply-swipe-indicator';
          swipeIcon.innerText = '↩';
          wrap.appendChild(swipeIcon);

          let startX = 0;
          let currentX = 0;
          let swiping = false;

          wrap.addEventListener('touchstart', e => {
            if (m.deletedForEveryone) return;
            startX = e.changedTouches[0].clientX;
            currentX = startX;
            swiping = true;
          }, { passive: true });

          wrap.addEventListener('touchmove', e => {
            if (!swiping || m.deletedForEveryone) return;

            currentX = e.changedTouches[0].clientX;
            let diff = currentX - startX;
            if (diff < 0) diff = 0;

            const moveX = Math.min(diff, 70);

            if (moveX > 8) {
              wrap.style.transform = `translateX(${moveX}px)`;
              swipeIcon.style.opacity = String(Math.min(moveX / 40, 1));
            } else {
              wrap.style.transform = 'translateX(0px)';
              swipeIcon.style.opacity = '0';
            }
          }, { passive: true });

          wrap.addEventListener('touchend', () => {
            if (!swiping) return;
            swiping = false;

            let diff = currentX - startX;
            if (diff < 0) diff = 0;

            wrap.style.transform = 'translateX(0px)';
            swipeIcon.style.opacity = '0';

            if (diff > 45 && !m.deletedForEveryone) {
              const txt =
                m.type === 'img' ? (m.caption || 'Photo') :
                m.type === 'video' ? (m.caption || 'Video') :
                (m.type === 'audio' || m.type === 'voice') ? (m.caption || 'Audio') :
                (m.content || 'Message');

              setReply(txt, msgId);
            }
          });

          wrap.addEventListener('touchcancel', () => {
            swiping = false;
            wrap.style.transform = 'translateX(0px)';
            swipeIcon.style.opacity = '0';
          });

          const div = document.createElement('div');
          div.className = 'msg ' + (m.sender === 'me' ? 'sent' : 'rec');

          if (m.deletedForEveryone) {
            div.classList.add(m.sender === 'me' ? 'deleted-bubble-me' : 'deleted-bubble-other');
          }

          div.onclick = () => {
            activeActionMessageId = msgId;
            activeActionMessage = m;

            const deleteMeBtn = document.getElementById("delete-me-btn");
            const deleteEveryoneBtn = document.getElementById("delete-everyone-btn");
            const replyBtn = document.getElementById("reply-btn");

            if (m.deletedForEveryone) {
              deleteEveryoneBtn.style.display = "none";
              replyBtn.style.display = "none";
              deleteMeBtn.style.display = "block";
            } else {
              deleteMeBtn.style.display = "block";
              deleteEveryoneBtn.style.display = "block";
              replyBtn.style.display = "block";
            }

            openActionSheet();
          };

          let html = "";

          if (m.replyToText) {
            html += `<div class="reply-ctx">${esc(m.replyToText)}</div>`;
          }

          if (m.deletedForEveryone) {
            const deletedText = m.deletedText || (m.sender === 'me' ? "You deleted this message" : "This message was deleted");
            html += `<div class="deleted-msg">${esc(deletedText)}</div>`;
          } else if (m.type === 'img') {
            html += `<div class="img-box"><img src="${esc(m.content)}" alt="image" data-open-media="1"></div>`;
            if (m.caption) html += `<div style="font-size:13px; margin-top:5px;">${esc(m.caption)}</div>`;
          } else if (m.type === 'video') {
            html += `<div class="img-box"><video src="${esc(m.content)}" preload="metadata" data-open-media="1"></video></div>`;
            if (m.caption) html += `<div style="font-size:13px; margin-top:5px;">${esc(m.caption)}</div>`;
          } else if (m.type === 'audio' || m.type === 'voice') {
            html += `
              <div class="audio-card">
                <button class="play-mini" data-open-media="1">${m.type === 'voice' ? '🎙️' : '🎵'}</button>
                <div style="flex:1;">
                  <div style="font-size:13px;">${m.type === 'voice' ? 'Voice message' : esc(m.fileName || 'Audio file')}</div>
                  <audio controls src="${esc(m.content)}"></audio>
                </div>
              </div>
            `;
            if (m.caption) html += `<div style="font-size:13px; margin-top:5px;">${esc(m.caption)}</div>`;
          } else if (m.type === 'care_check') {
            html += `<div>${esc(m.content)}</div>`;
            html += `<button class="care-btn" onclick="replyCare(event, 'I am good! 😊')">I'm Good</button>`;
          } else {
            html += linkify(m.content);
          }

          if (!m.deletedForEveryone) {
            html += `
              <div class="msg-footer">
                <span class="msg-time">${formatTime(m.time)}</span>
                ${m.sender === 'me' ? getTickMarkup(!!m.seen, true) : ''}
              </div>
            `;
          } else {
            html += `
              <div class="msg-footer">
                <span class="msg-time">${formatTime(m.deletedAt || m.time)}</span>
              </div>
            `;
          }

          div.innerHTML = html;

          div.querySelectorAll('[data-open-media="1"]').forEach(el => {
            el.addEventListener('click', (ev) => {
              ev.stopPropagation();
              openViewer(m.type, m.content);
            });
          });

          wrap.appendChild(div);
          win.appendChild(wrap);

          if (m.type === 'care_check') hasCareCheck = true;
          if (typeof m.time === "number" && m.time > lastT) lastT = m.time;
        });

        renderUploadingMessages(win);
        win.scrollTop = win.scrollHeight;

        if (lastT > 0 && (Date.now() - lastT > 4 * 24 * 60 * 60 * 1000) && !hasCareCheck) {
          db.ref('chats/' + myPartnerID).push({
            content: "It's been a bit quiet here... ❤️",
            type: 'care_check',
            sender: '11LOTUS',
            time: Date.now(),
            seen: false
          });
        }
      });
    }

    function sendMsg() {
      const i = document.getElementById('chat-input');
      const text = i.value.trim();

      if (isBlocked) return alert("This chat is blocked");
      if (!text) return;
      if (!myPartnerID) return alert("Login first");

      db.ref('chats/' + myPartnerID).push({
        content: text,
        type: 'text',
        sender: 'me',
        time: Date.now(),
        seen: false,
        delivered: true,
        replyTo: replyMessageId || null,
        replyToText: replyPreviewText || null,
        deletedForEveryone: false
      }).then(() => {
        i.value = "";
        cancelReply();
      }).catch(err => {

    function getSelectedPreviewHTML(type, url) {
      if (type === "img") return `<img src="${url}" alt="preview">`;
      if (type === "video") return `<video src="${url}" controls></video>`;
      return `<audio src="${url}" controls style="width:min(92vw,420px);"></audio>`;
    }

    function openPreview(input) {
      if (isBlocked) {
        alert("This chat is blocked");
        input.value = "";
        return;
      }

      const file = input.files[0];
      if (!file) return;

      const type = getFileType(file);
      if (!type || type === "file") {
        alert("Please select image, video, or audio");
        input.value = "";
        return;
      }

      selectedFile = file;
      selectedKind = type;
      selectedPreviewURL = URL.createObjectURL(file);

      document.getElementById('preview-body').innerHTML = getSelectedPreviewHTML(type, selectedPreviewURL);
      document.getElementById('media-preview').style.display = 'flex';
    }

    function closePreview() {
      document.getElementById('media-preview').style.display = 'none';
      document.getElementById('preview-body').innerHTML = '';
      document.getElementById('caption-input').value = '';
      document.getElementById('file-in').value = '';
      if (selectedPreviewURL) URL.revokeObjectURL(selectedPreviewURL);
      selectedFile = null;
      selectedKind = null;
      selectedPreviewURL = null;
    }

    function uploadWithCaption() {
      if (isBlocked) return alert("This chat is blocked");
      if (!authReady) return alert("Please wait a moment");
      if (!myPartnerID) return alert("Login first");
      if (!selectedFile) return alert("Choose a file first");

      const btn = document.getElementById('upload-btn');
      const cap = document.getElementById('caption-input').value.trim();
      const safeName = selectedFile.name.replace(/[^\w.\-]/g, "_");
      const path = `media/${myPartnerID}/${Date.now()}_${safeName}`;
      const ref = storage.ref().child(path);

      const localURL = selectedPreviewURL || URL.createObjectURL(selectedFile);
      const localUploadId = "upload_" + Date.now() + "_" + Math.random().toString(36).slice(2);

      uploadsById[localUploadId] = {
        id: localUploadId,
        localURL,
        caption: cap,
        fileName: selectedFile.name,
        fileSize: selectedFile.size,
        progress: 0,
        bytesTransferred: 0,
        totalBytes: selectedFile.size,
        startTime: Date.now(),
        replyToText: replyPreviewText || null,
        type: selectedKind || getFileType(selectedFile)
      };

      loadMessages();

      btn.disabled = true;
      btn.innerText = "...";

      const uploadTask = ref.put(selectedFile);

      uploadTask.on(
        "state_changed",
        (snapshot) => {
          const percent = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
          if (uploadsById[localUploadId]) {
            uploadsById[localUploadId].progress = percent;
            uploadsById[localUploadId].bytesTransferred = snapshot.bytesTransferred;
            uploadsById[localUploadId].totalBytes = snapshot.totalBytes;
            loadMessages();
          }
        },
        (error) => {
          console.error(error);
          if (uploadsById[localUploadId]?.localURL) URL.revokeObjectURL(uploadsById[localUploadId].localURL);
          delete uploadsById[localUploadId];
          loadMessages();
          alert("Upload failed: " + error.message);
          btn.disabled = false;
          btn.innerText = ">";
        },
        () => {
          uploadTask.snapshot.ref.getDownloadURL()
            .then((url) => {
              return db.ref('chats/' + myPartnerID).push({
                content: url,
                caption: cap,
                type: uploadsById[localUploadId]?.type || selectedKind || getFileType(selectedFile),
                sender: 'me',
                time: Date.now(),
                seen: false,
                delivered: true,
                replyTo: replyMessageId || null,
                replyToText: replyPreviewText || null,
                deletedForEveryone: false,
                fileSize: selectedFile.size,
                fileName: selectedFile.name
              });
            })
            .then(() => {
              if (uploadsById[localUploadId]?.localURL) URL.revokeObjectURL(uploadsById[localUploadId].localURL);
              delete uploadsById[localUploadId];
              loadMessages();
              btn.disabled = false;
              btn.innerText = ">";
              closePreview();
              cancelReply();
            })
            .catch((e) => {
              console.error(e);
              if (uploadsById[localUploadId]?.localURL) URL.revokeObjectURL(uploadsById[localUploadId].localURL);
              delete uploadsById[localUploadId];
              loadMessages();
              alert("Send failed: " + e.message);
              btn.disabled = false;
              btn.innerText = ">";
            });
        }
      );
    }

    async function toggleVoiceRecord() {
      if (isBlocked) return alert("This chat is blocked");

      if (isRecording) {
        stopVoiceRecording(false);
        return;
      }

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recordingChunks = [];

        const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
          : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
          : '';

        mediaRecorder = new MediaRecorder(mediaStream, mimeType ? { mimeType } : undefined);

        mediaRecorder.ondataavailable = (e) => {
          if (e.data && e.data.size > 0) recordingChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
          const blobType = mimeType || 'audio/webm';
          const blob = new Blob(recordingChunks, { type: blobType });
          const ext = blobType.includes('mp4') ? 'm4a' : 'webm';
          const file = new File([blob], `voice_${Date.now()}.${ext}`, { type: blobType });

          selectedFile = file;
          selectedKind = "voice";
          selectedPreviewURL = URL.createObjectURL(file);

          document.getElementById('preview-body').innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; gap:14px;">
              <div style="font-size:18px;"><span class="recording-dot"></span>Voice message ready</div>
              <audio src="${selectedPreviewURL}" controls style="width:min(92vw,420px);"></audio>
            </div>
          `;
          document.getElementById('media-preview').style.display = 'flex';

          if (mediaStream) {
            mediaStream.getTracks().forEach(t => t.stop());
            mediaStream = null;
          }
        };

        mediaRecorder.start();
        isRecording = true;
        document.getElementById("record-btn").innerText = "⏹️";
        document.getElementById("chat-input").placeholder = "Recording voice...";
      } catch (e) {
        console.error(e);
        alert("Microphone access failed");
      }
    }

    function stopVoiceRecording(cancelOnly) {
      if (!isRecording) return;
      isRecording = false;
      document.getElementById("record-btn").innerText = "🎤";
      document.getElementById("chat-input").placeholder = "Type a message...";

      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        if (cancelOnly) {
          mediaRecorder.onstop = () => {
            if (mediaStream) {
              mediaStream.getTracks().forEach(t => t.stop());
              mediaStream = null;
            }
          };
        }
        mediaRecorder.stop();
      } else if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
      }
    }

    function openActionSheet() {
      document.getElementById('action-sheet').style.display = 'flex';
    }

    function closeActionSheet() {
      document.getElementById('action-sheet').style.display = 'none';
      activeActionMessageId = null;
      activeActionMessage = null;
    }

    function deleteForMe() {
      if (!activeActionMessageId) return;
      setLocalDeleted(activeActionMessageId);
      closeActionSheet();
      loadMessages();
    }

    function deleteForEveryone() {
      if (!activeActionMessageId || !myPartnerID) return;

      const isMine = activeActionMessage && activeActionMessage.sender === 'me';

      db.ref(`chats/${myPartnerID}/${activeActionMessageId}`).update({
        deletedForEveryone: true,
        deletedText: isMine ? "You deleted this message" : "This message was deleted",
        deletedAt: Date.now()
      }).then(() => {
        closeActionSheet();
      }).catch(err => {
        console.error(err);
        alert("Delete failed: " + err.message);
      });
    }

    function setReplyFromAction() {
      if (!activeActionMessage) return;

      let txt = "Message";
      if (activeActionMessage.deletedForEveryone) {
        txt = "Deleted message";
      } else if (activeActionMessage.type === 'img') {
        txt = activeActionMessage.caption || "Photo";
      } else if (activeActionMessage.type === 'video') {
        txt = activeActionMessage.caption || "Video";
      } else if (activeActionMessage.type === 'audio' || activeActionMessage.type === 'voice') {
        txt = activeActionMessage.caption || "Audio";
      } else {
        txt = activeActionMessage.content || "Message";
      }

      setReply(txt, activeActionMessageId);
      closeActionSheet();
    }

    function replyCare(ev, t) {
      ev.stopPropagation();
      if (isBlocked) return alert("This chat is blocked");

      db.ref('chats/' + myPartnerID).push({
        content: t,
        type: 'text',
        sender: 'me',
        time: Date.now(),
        seen: false,
        delivered: true,
        deletedForEveryone: false
      });
    }

    function triggerNuclearBomb() {
      if (!myPartnerID) return alert("Login first");
      if (!confirm("Delete all your sent messages for everyone?")) return;

      db.ref('chats/' + myPartnerID).once('value')
        .then(snap => {
          const updates = {};
          snap.forEach(c => {
            const v = c.val();
            if (v && v.sender === 'me') {
              updates[c.key + '/deletedForEveryone'] = true;
              updates[c.key + '/deletedText'] = "You deleted this message";
              updates[c.key + '/deletedAt'] = Date.now();
            }
          });
          return db.ref('chats/' + myPartnerID).update(updates);
        })
        .catch(err => {
          console.error(err);
          alert("Nuclear delete failed: " + err.message);
        });
    }
  </script>
</body>
</html>
