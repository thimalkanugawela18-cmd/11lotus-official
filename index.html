<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11LOTUS | Souls Sanctuary</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap');
        :root { --gold: #d4af37; --dark: #050505; --red: #ff4444; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex !important; }
        .container { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); padding: 35px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3); width: 85%; max-width: 380px; text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--gold); letter-spacing: 8px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; color: #fff; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        
        /* Chat UI Improvements */
        header { width: 100%; padding: 15px; background: #111; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        #chat-window { flex: 1; width: 100%; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; }
        .msg { max-width: 75%; padding: 12px; border-radius: 15px; font-size: 15px; }
        .sent { align-self: flex-end; background: var(--gold); color: #000; }
        .rec { align-self: flex-start; background: #222; }
        .block-btn { background: none; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-family: 'Orbitron'; }
        .block-btn.blocked { background: var(--red); color: #fff; }
        .input-area { width: 100%; padding: 15px; background: #111; display: flex; gap: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="container">
            <h1>11LOTUS</h1>
            <input type="text" id="partner-id" placeholder="PARTNER ID">
            <input type="password" id="password" placeholder="SECRET PASSWORD">
            <button class="btn" onclick="handleAuth()">UNLOCK SANCTUARY</button>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div class="container">
            <h2 style="color:var(--gold);">INITIALIZE</h2>
            <input type="password" id="new-pass" placeholder="Set Password">
            <input type="text" id="personal-key" placeholder="Recovery Key">
            <button class="btn" onclick="saveUser()">SAVE & ENTER</button>
        </div>
    </div>

    <div id="chat-screen" class="screen" style="justify-content: flex-start;">
        <header>
            <div style="color:var(--gold); font-family:'Orbitron'; font-size:14px; letter-spacing:2px;">SANCTUARY</div>
            <button id="block-control" class="block-btn" onclick="toggleBlock()">BLOCK</button>
        </header>
        <div id="chat-window"></div>
        <div class="input-area" id="input-container">
            <input type="text" id="chat-input" style="margin:0;" placeholder="Whisper something...">
            <button onclick="sendMessage()" style="width:60px; background:var(--gold); border:none; border-radius:8px; font-weight:bold;">></button>
        </div>
        <div id="block-msg" style="display:none; padding:20px; color:var(--red); font-weight:bold;">YOU HAVE BLOCKED THIS PARTNER</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAj1BdBNkVUhW7Cn6muBm6hmGG59l_RsQ",
            authDomain: "lotus-official-4c28b.firebaseapp.com",
            databaseURL: "https://lotus-official-4c28b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lotus-official-4c28b",
            storageBucket: "lotus-official-4c28b.firebasestorage.app",
            messagingSenderId: "584674732018",
            appId: "1:584674732018:web:b6e5fa13708eac51512d6b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUserID = "";

        window.onload = function() {
            const id = new URLSearchParams(window.location.search).get('id');
            if(id) document.getElementById('partner-id').value = id;
        };

        function handleAuth() {
            currentUserID = document.getElementById('partner-id').value;
            const pass = document.getElementById('password').value;
            if(!currentUserID || !pass) return alert("Fill fields!");

            db.ref('users/' + currentUserID).once('value', snap => {
                const data = snap.val();
                if(!data) showScreen('setup-screen');
                else if(data.password === pass) startChat(currentUserID);
                else alert("Wrong Password!");
            });
        }

        function saveUser() {
            const pass = document.getElementById('new-pass').value;
            const pKey = document.getElementById('personal-key').value;
            db.ref('users/' + currentUserID).set({ password: pass, personalKey: pKey }).then(() => startChat(currentUserID));
        }

        function startChat(id) {
            showScreen('chat-screen');
            
            // Block කරලද බලනවා
            db.ref('users/' + id + '/blocked').on('value', snap => {
                const isBlocked = snap.val();
                const btn = document.getElementById('block-control');
                const inputCont = document.getElementById('input-container');
                const blockMsg = document.getElementById('block-msg');

                if(isBlocked) {
                    btn.innerText = "UNBLOCK";
                    btn.classList.add('blocked');
                    inputCont.style.display = "none";
                    blockMsg.style.display = "block";
                } else {
                    btn.innerText = "BLOCK";
                    btn.classList.remove('blocked');
                    inputCont.style.display = "flex";
                    blockMsg.style.display = "none";
                }
            });

            // මැසේජ් ලෝඩ් කරනවා
            db.ref('chats/' + id).on('child_added', snap => {
                const m = snap.val();
                const div = document.createElement('div');
                div.className = "msg " + (m.sender === 'me' ? 'sent' : 'rec');
                div.innerText = m.text;
                document.getElementById('chat-window').appendChild(div);
                document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            });
        }

        function toggleBlock() {
            const btn = document.getElementById('block-control');
            const newState = btn.innerText === "BLOCK";
            if(confirm(newState ? "Block this partner?" : "Unblock partner?")) {
                db.ref('users/' + currentUserID).update({ blocked: newState });
            }
        }

        function sendMessage() {
            const text = document.getElementById('chat-input').value;
            if(!text) return;
            db.ref('chats/' + currentUserID).push({ text: text, sender: 'me', time: Date.now() });
            document.getElementById('chat-input').value = "";
        }

        function showScreen(sid) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(sid).classList.add('active');
        }
    </script>
</body>
</html>
