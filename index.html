<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>11LOTUS | Souls Sanctuary PRO</title>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <!-- Emoji Mart browser build -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap');

        :root {
            --gold: #d4af37;
            --dark: #0b0b0b;
            --bubble-me: #d4af37;
            --bubble-you: #202020;
            --blue: #4fc3f7;
            --soft-line: rgba(255,255,255,0.08);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .active { display: flex !important; }

        .container {
            background: rgba(20, 20, 20, 0.95);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid var(--gold);
            width: 85%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            outline: none;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            margin-top: 10px;
        }

        #chat-screen {
            justify-content: flex-start;
            align-items: stretch;
        }

        header {
            width: 100%;
            padding: 12px 15px;
            background: #111;
            border-bottom: 1px solid rgba(212, 175, 55, 0.25);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
            background-color: var(--dark);
        }

        .msg-wrap {
            display: flex;
            flex-direction: column;
            width: 100%;
            position: relative;
            touch-action: pan-y;
        }

        .msg {
            max-width: 78%;
            padding: 8px 12px 6px 12px;
            border-radius: 14px;
            font-size: 15px;
            position: relative;
            word-wrap: break-word;
            line-height: 1.4;
            cursor: pointer;
        }

        .msg img {
            max-width: 230px !important;
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
            margin: 4px 0;
            border: 1px solid rgba(255,255,255,0.08);
        }

        @media (max-width: 480px) {
            .msg img { max-width: 190px !important; }
        }

        .sent {
            align-self: flex-end;
            background: var(--bubble-me);
            color: #000;
            border-bottom-right-radius: 3px;
        }

        .rec {
            align-self: flex-start;
            background: var(--bubble-you);
            color: #fff;
            border-bottom-left-radius: 3px;
        }

        .msg-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            min-height: 14px;
        }

        .msg-time {
            font-size: 11px;
            opacity: 0.75;
        }

        .status-tick {
            font-size: 11px;
            opacity: 0.75;
        }

        .seen-tick {
            color: var(--blue);
            opacity: 1;
        }

        .reply-ctx {
            background: rgba(0,0,0,0.15);
            border-left: 3px solid var(--gold);
            padding: 4px 8px;
            margin-bottom: 6px;
            border-radius: 4px;
            font-size: 12px;
            opacity: 0.9;
        }

        #reply-bar {
            display: none;
            background: #1a1a1a;
            padding: 8px 15px;
            border-top: 1px solid rgba(212,175,55,0.4);
            align-items: center;
            gap: 10px;
        }

        .rabbit-bar {
            width: 100%;
            display: flex;
            gap: 8px;
            align-items: center;
            overflow-x: auto;
            padding: 8px 12px;
            background: #141414;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .rabbit-pill {
            border: 1px solid rgba(212,175,55,0.35);
            background: #202020;
            color: #fff;
            border-radius: 999px;
            padding: 6px 10px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 18px;
        }

        .blocked-banner {
            display: none;
            background: rgba(255,91,91,0.12);
            color: #ff9a9a;
            border-top: 1px solid rgba(255,91,91,0.2);
            border-bottom: 1px solid rgba(255,91,91,0.2);
            padding: 10px 14px;
            font-size: 14px;
            text-align: center;
        }

        .input-area {
            width: 100%;
            padding: 10px 15px;
            background: #181818;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        #chat-input {
            flex: 1;
            padding: 12px;
            background: #2a2a2a;
            border: none;
            border-radius: 25px;
            color: #fff;
            outline: none;
            margin: 0;
        }

        .icon-btn {
            color: var(--gold);
            font-size: 22px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .send-btn {
            background: var(--gold);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
        }

        .send-btn:disabled, .icon-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.38);
            z-index: 9000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #preview-body img,
        #image-viewer-img {
            max-height: 78vh;
            max-width: 92vw;
            border-radius: 12px;
        }

        .care-btn {
            border: 1px solid var(--gold);
            background: none;
            color: var(--gold);
            border-radius: 15px;
            padding: 5px 12px;
            font-size: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        #emoji-panel {
            display: none;
            position: absolute;
            bottom: 68px;
            left: 12px;
            width: 340px;
            max-width: calc(100vw - 24px);
            background: #171717;
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 16px;
            padding: 6px;
            z-index: 60;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
        }

        #emoji-mart-host {
            width: 100%;
        }

        #action-sheet .sheet-box {
            width: 92%;
            max-width: 320px;
            background: #111;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }

        .sheet-btn {
            width: 100%;
            padding: 15px;
            border: none;
            background: #111;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .sheet-btn:last-child { border-bottom: none; }
        .sheet-btn.gold { color: #f5c84c; }
        .sheet-btn.danger { color: #ff5b5b; }
        .sheet-btn:hover { background: #1b1b1b; }

        .deleted-msg {
            font-style: italic;
            opacity: 0.78;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .deleted-msg::before {
            content: "🚫";
            font-style: normal;
            opacity: 0.85;
        }

        .deleted-bubble-me {
            background: #ccb96f !important;
            color: rgba(0,0,0,0.8) !important;
        }

        .deleted-bubble-other {
            background: #2a2a2a !important;
            color: rgba(255,255,255,0.8) !important;
        }

        .img-box {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .upload-preview-bubble {
            opacity: 0.98;
        }

        .upload-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .circle-wrap {
            width: 68px;
            height: 68px;
            position: relative;
            background: rgba(0,0,0,0.42);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .circle-svg {
            width: 68px;
            height: 68px;
            transform: rotate(-90deg);
            position: absolute;
            top: 0;
            left: 0;
        }

        .circle-bg {
            fill: none;
            stroke: rgba(255,255,255,0.25);
            stroke-width: 6;
        }

        .circle-progress {
            fill: none;
            stroke: var(--gold);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 188.5;
            stroke-dashoffset: 188.5;
            transition: stroke-dashoffset 0.2s linear;
        }

        .circle-text {
            position: relative;
            z-index: 2;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
        }

        .tiny-progress {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.16);
            border-radius: 999px;
            overflow: hidden;
            margin-top: 8px;
        }

        .tiny-progress-fill {
            height: 100%;
            width: 0%;
            background: var(--gold);
            transition: width 0.2s linear;
        }

        .tiny-upload-info {
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            opacity: 0.8;
        }

        .msg-link {
            color: inherit;
            text-decoration: underline;
            word-break: break-all;
        }

        .menu-dot {
            font-size: 18px;
            opacity: 0.9;
        }
    </style>
</head>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAj1BdBnNkVUhW7Cn6muBm6hmGG59l_RsQ",
            authDomain: "lotus-official-4c28b.firebaseapp.com",
            databaseURL: "https://lotus-official-4c28b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lotus-official-4c28b",
            storageBucket: "lotus-official-4c28b.firebasestorage.app",
            messagingSenderId: "584674732018",
            appId: "1:584674732018:web:b6e5fa13708eac51512d6b"
        };

        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        let myPartnerID = "";
        let selectedFile = null;
        let chatRef = null;
        let settingsRef = null;
        let authReady = false;

        let replyMessageId = null;
        let replyPreviewText = "";

        let activeActionMessageId = null;
        let activeActionMessage = null;

        let isBlocked = false;

        const deletedLocalPrefix = "deleted_local_11lotus_";
        const uploadsById = {};

        auth.signInAnonymously()
            .then(() => {
                authReady = true;
                console.log("Anonymous auth success");
            })
            .catch(err => {
                console.error(err);
                alert("Firebase Auth Error: " + err.message);
            });

        function sanitizeKey(value) {
            return (value || "").replace(/[.#$[\]/]/g, "_");
        }

        function esc(str) {
            const d = document.createElement("div");
            d.textContent = str || "";
            return d.innerHTML;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function formatTime(ts) {
            if (!ts) return "";
            const d = new Date(ts);
            let h = d.getHours();
            const m = String(d.getMinutes()).padStart(2, "0");
            const ampm = h >= 12 ? "PM" : "AM";
            h = h % 12;
            h = h ? h : 12;
            return `${h}:${m} ${ampm}`;
        }

        function formatBytes(bytes) {
            if (!bytes && bytes !== 0) return "";
            if (bytes === 0) return "0 Bytes";
            const sizes = ["Bytes", "KB", "MB", "GB"];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            const value = bytes / Math.pow(1024, i);
            return value.toFixed(i === 0 ? 0 : 2) + " " + sizes[i];
        }

        function getTickMarkup(seen, delivered = true) {
            if (!delivered) return `<span class="status-tick">🕓</span>`;
            return `<span class="status-tick ${seen ? 'seen-tick' : ''}">${seen ? '✓✓' : '✓'}</span>`;
        }

        function getLocalDeleteMap() {
            try {
                return JSON.parse(localStorage.getItem(deletedLocalPrefix + myPartnerID) || "{}");
            } catch {
                return {};
            }
        }

        function setLocalDeleted(messageId) {
            const map = getLocalDeleteMap();
            map[messageId] = true;
            localStorage.setItem(deletedLocalPrefix + myPartnerID, JSON.stringify(map));
        }

        function isLocallyDeleted(messageId) {
            const map = getLocalDeleteMap();
            return !!map[messageId];
        }

        function linkify(text) {
            const safe = esc(text || "");
            return safe.replace(
                /(https?:\/\/[^\s<]+)/g,
                '<a class="msg-link" href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
            );
        }

        function insertQuickEmoji(value) {
            const input = document.getElementById("chat-input");
            input.value += value + " ";
            input.focus();
        }

        async function initEmojiMart() {
            const host = document.getElementById("emoji-mart-host");
            host.innerHTML = "";

            try {
                const picker = new EmojiMart.Picker({
                    data: async () => {
                        const response = await fetch('https://cdn.jsdelivr.net/npm/@emoji-mart/data');
                        return response.json();
                    },
                    theme: 'dark',
                    previewPosition: 'none',
                    navPosition: 'top',
                    searchPosition: 'sticky',
                    set: 'native',
                    perLine: 8,
                    emojiButtonSize: 38,
                    emojiSize: 24,
                    maxFrequentRows: 2,
                    locale: 'en',
                    onEmojiSelect: (emoji) => {
                        document.getElementById('chat-input').value += emoji.native;
                    }
                });

                host.appendChild(picker);
            } catch (e) {
                console.error("Emoji Mart init failed:", e);
            }
        }

        document.getElementById("emoji-btn").addEventListener("click", async () => {
            const panel = document.getElementById("emoji-panel");
            const willOpen = panel.style.display !== "block";
            panel.style.display = willOpen ? "block" : "none";
            if (willOpen && !document.getElementById("emoji-mart-host").children.length) {
                await initEmojiMart();
            }
        });

        document.addEventListener("click", (e) => {
            const panel = document.getElementById("emoji-panel");
            const emojiBtn = document.getElementById("emoji-btn");
            if (!panel.contains(e.target) && e.target !== emojiBtn) {
                panel.style.display = "none";
            }
        });

        function handleAuth() {
            const rawId = document.getElementById('partner-id').value.trim();
            const password = document.getElementById('password').value;

            if (!rawId) return alert("Enter Partner ID");
            if (!password) return alert("Enter Password");

            myPartnerID = sanitizeKey(rawId);

            db.ref('users/' + myPartnerID).once('value')
                .then(snap => {
                    const u = snap.val();
                    if (!u) {
                        showScreen('setup-screen');
                    } else if (u.password === password) {
                        showScreen('chat-screen');
                        bindSettings();
                        loadMessages();
                    } else {
                        alert("Wrong Password");
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("Login error: " + err.message);
                });
        }

        function saveUser() {
            const p = document.getElementById('new-pass').value.trim();
            const k = document.getElementById('personal-key').value.trim();

            if (!myPartnerID) return alert("Enter Partner ID first");
            if (!p || !k) return alert("Fill all fields");

            db.ref('users/' + myPartnerID).set({
                password: p,
                key: k,
                blocked: false
            }).then(() => {
                showScreen('chat-screen');
                bindSettings();
                loadMessages();
            }).catch(err => {
                console.error(err);
                alert("Save user error: " + err.message);
            });
        }

        function showRecovery() {
            document.getElementById('recovery-modal').style.display = 'flex';
        }

        function closeRecovery() {
            document.getElementById('recovery-modal').style.display = 'none';
            document.getElementById('recover-key-input').style.display = 'block';
            document.getElementById('new-password-input').style.display = 'none';
            document.getElementById('recover-key-input').value = '';
            document.getElementById('new-password-input').value = '';
            const btn = document.getElementById('recovery-btn');
            btn.innerText = "VERIFY KEY";
            btn.onclick = verifyRecoveryKey;
        }

        function verifyRecoveryKey() {
            const id = sanitizeKey(document.getElementById('partner-id').value.trim());
            const key = document.getElementById('recover-key-input').value.trim();

            if (!id) return alert("Enter Partner ID first");
            if (!key) return alert("Enter Recovery Key");

            db.ref('users/' + id).once('value')
                .then(s => {
                    if (s.val() && s.val().key === key) {
                        document.getElementById('recover-key-input').style.display = 'none';
                        document.getElementById('new-password-input').style.display = 'block';
                        document.getElementById('recovery-btn').innerText = "RESET PASSWORD";
                        document.getElementById('recovery-btn').onclick = resetPassword;
                    } else {
                        alert("Invalid Key");
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("Recovery error: " + err.message);
                });
        }

        function resetPassword() {
            const id = sanitizeKey(document.getElementById('partner-id').value.trim());
            const np = document.getElementById('new-password-input').value.trim();

            if (!id || !np) return alert("Missing fields");

            db.ref('users/' + id).update({ password: np })
                .then(() => {
                    alert("Password reset successful");
                    location.reload();
                })
                .catch(err => {
                    console.error(err);
                    alert("Reset error: " + err.message);
                });
        }

        function bindSettings() {
            if (!myPartnerID) return;

            if (settingsRef) settingsRef.off();

            settingsRef = db.ref('users/' + myPartnerID);
            settingsRef.on('value', snap => {
                const data = snap.val() || {};
                isBlocked = !!data.blocked;
                applyBlockUI();
            });
        }

        function applyBlockUI() {
            const input = document.getElementById("chat-input");
            const sendBtn = document.getElementById("send-btn");
            const fileInput = document.getElementById("file-in");
            const blockBtn = document.getElementById("block-btn");
            const banner = document.getElementById("blocked-banner");

            input.disabled = isBlocked;
            sendBtn.disabled = isBlocked;
            fileInput.disabled = isBlocked;
            blockBtn.innerText = isBlocked ? "✅" : "🚫";
            blockBtn.title = isBlocked ? "Unblock chat" : "Block chat";
            banner.style.display = isBlocked ? "block" : "none";
        }

        function toggleBlockState() {
            if (!myPartnerID) return;
            db.ref('users/' + myPartnerID).update({
                blocked: !isBlocked
            });
        }

        function setReply(text, id) {
            replyMessageId = id;
            replyPreviewText = text;
            document.getElementById('reply-bar').style.display = 'flex';
            document.getElementById('reply-txt').innerText = "Replying: " + text;
        }

        function cancelReply() {
            replyMessageId = null;
            replyPreviewText = "";
            document.getElementById('reply-bar').style.display = 'none';
            document.getElementById('reply-txt').innerText = "Replying...";
        }

        function openImageViewer(url) {
            const viewer = document.getElementById("image-viewer");
            const img = document.getElementById("image-viewer-img");
            img.src = url;
            viewer.style.display = "flex";
        }

        function closeImageViewer() {
            document.getElementById("image-viewer").style.display = "none";
            document.getElementById("image-viewer-img").src = "";
        }

        function renderUploadingMessages(win) {
            const uploadEntries = Object.values(uploadsById).sort((a, b) => a.startTime - b.startTime);

            uploadEntries.forEach(item => {
                const wrap = document.createElement("div");
                wrap.className = "msg-wrap";

                const div = document.createElement("div");
                div.className = "msg sent upload-preview-bubble";

                const circumference = 188.5;
                const offset = circumference - (item.progress / 100) * circumference;

                let html = "";

                if (item.replyToText) {
                    html += `<div class="reply-ctx">${esc(item.replyToText)}</div>`;
                }

                html += `
                    <div class="img-box">
                        <img src="${item.localURL}" alt="upload preview">
                        <div class="upload-overlay">
                            <div class="circle-wrap">
                                <svg class="circle-svg" viewBox="0 0 68 68">
                                    <circle class="circle-bg" cx="34" cy="34" r="30"></circle>
                                    <circle class="circle-progress" cx="34" cy="34" r="30" style="stroke-dashoffset:${offset};"></circle>
                                </svg>
                                <div class="circle-text">${item.progress}%</div>
                            </div>
                        </div>
                    </div>
                `;

                if (item.caption) {
                    html += `<div style="font-size:13px; margin-top:6px;">${esc(item.caption)}</div>`;
                }

                html += `
                    <div class="tiny-progress">
                        <div class="tiny-progress-fill" style="width:${item.progress}%;"></div>
                    </div>
                    <div class="tiny-upload-info">
                        <span>${formatBytes(item.bytesTransferred)} / ${formatBytes(item.totalBytes || item.fileSize)}</span>
                        <span>Sending...</span>
                    </div>
                    <div class="msg-footer">
                        <span class="msg-time">${formatTime(item.startTime)}</span>
                        ${getTickMarkup(false, false)}
                    </div>
                `;

                div.innerHTML = html;
                wrap.appendChild(div);
                win.appendChild(wrap);
            });
        }

        function loadMessages() {
            const win = document.getElementById('chat-window');

            if (chatRef) chatRef.off();

            chatRef = db.ref('chats/' + myPartnerID);

            chatRef.on('value', snap => {
                win.innerHTML = "";
                let lastT = 0;
                let hasCareCheck = false;

                snap.forEach(child => {
                    const m = child.val();
                    const msgId = child.key;

                    if (!m) return;
                    if (isLocallyDeleted(msgId)) return;

                    if (m.sender !== 'me' && !m.seen && !m.deletedForEveryone) {
                        db.ref(`chats/${myPartnerID}/${msgId}`).update({ seen: true });
                    }

                    const wrap = document.createElement('div');
                    wrap.className = 'msg-wrap';

                    let startX = 0;
                    wrap.addEventListener('touchstart', e => {
                        startX = e.changedTouches[0].clientX;
                    });

                    wrap.addEventListener('touchend', e => {
                        const endX = e.changedTouches[0].clientX;
                        if (endX - startX > 70 && !m.deletedForEveryone) {
                            const txt = m.type === 'img' ? (m.caption || 'Photo') : (m.content || 'Message');
                            setReply(txt, msgId);
                        }
                    });

                    const div = document.createElement('div');
                    div.className = 'msg ' + (m.sender === 'me' ? 'sent' : 'rec');

                    if (m.deletedForEveryone) {
                        div.classList.add(m.sender === 'me' ? 'deleted-bubble-me' : 'deleted-bubble-other');
                    }

                    div.onclick = () => {
                        activeActionMessageId = msgId;
                        activeActionMessage = m;

                        const deleteMeBtn = document.getElementById("delete-me-btn");
                        const deleteEveryoneBtn = document.getElementById("delete-everyone-btn");
                        const replyBtn = document.getElementById("reply-btn");

                        if (m.deletedForEveryone) {
                            deleteEveryoneBtn.style.display = "none";
                            replyBtn.style.display = "none";
                            deleteMeBtn.style.display = "block";
                        } else {
                            deleteMeBtn.style.display = "block";
                            deleteEveryoneBtn.style.display = "block";
                            replyBtn.style.display = "block";
                        }

                        openActionSheet();
                    };

                    let html = "";

                    if (m.replyToText) {
                        html += `<div class="reply-ctx">${esc(m.replyToText)}</div>`;
                    }

                    if (m.deletedForEveryone) {
                        const deletedText = m.deletedText || (m.sender === 'me' ? "You deleted this message" : "This message was deleted");
                        html += `<div class="deleted-msg">${esc(deletedText)}</div>`;
                    } else if (m.type === 'img') {
                        html += `
                            <div class="img-box">
                                <img src="${esc(m.content)}" alt="image" data-open-image="1">
                            </div>
                        `;
                        if (m.caption) {
                            html += `<div style="font-size:13px; margin-top:5px;">${esc(m.caption)}</div>`;
                        }
                    } else if (m.type === 'care_check') {
                        html += `<div>${esc(m.content)}</div>`;
                        html += `<button class="care-btn" onclick="replyCare(event, 'I am good! 😊')">I'm Good</button>`;
                    } else {
                        html += linkify(m.content);
                    }

                    if (!m.deletedForEveryone) {
                        html += `
                            <div class="msg-footer">
                                <span class="msg-time">${formatTime(m.time)}</span>
                                ${m.sender === 'me' ? getTickMarkup(!!m.seen, true) : ''}
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="msg-footer">
                                <span class="msg-time">${formatTime(m.deletedAt || m.time)}</span>
                            </div>
                        `;
                    }

                    div.innerHTML = html;

                    const imgEl = div.querySelector('img[data-open-image="1"]');
                    if (imgEl) {
                        imgEl.addEventListener('click', (ev) => {
                            ev.stopPropagation();
                            openImageViewer(m.content);
                        });
                    }

                    wrap.appendChild(div);
                    win.appendChild(wrap);

                    if (m.type === 'care_check') hasCareCheck = true;
                    if (typeof m.time === "number" && m.time > lastT) lastT = m.time;
                });

                renderUploadingMessages(win);

                win.scrollTop = win.scrollHeight;

                if (lastT > 0 && (Date.now() - lastT > 4 * 24 * 60 * 60 * 1000) && !hasCareCheck) {
                    db.ref('chats/' + myPartnerID).push({
                        content: "It's been a bit quiet here... ❤️",
                        type: 'care_check',
                        sender: '11LOTUS',
                        time: Date.now(),
                        seen: false
                    });
                }
            });
        }

        function sendMsg() {
            const i = document.getElementById('chat-input');
            const text = i.value.trim();

            if (isBlocked) return alert("This chat is blocked");
            if (!text) return;
            if (!myPartnerID) return alert("Login first");

            db.ref('chats/' + myPartnerID).push({
                content: text,
                type: 'text',
                sender: 'me',
                time: Date.now(),
                seen: false,
                delivered: true,
                replyTo: replyMessageId || null,
                replyToText: replyPreviewText || null,
                deletedForEveryone: false
            }).then(() => {
                i.value = "";
                cancelReply();
            }).catch(err => {
                console.error(err);
                alert("Send error: " + err.message);
            });
        }

        function openPreview(input) {
            if (isBlocked) {
                alert("This chat is blocked");
                input.value = "";
                return;
            }

            const file = input.files[0];
            if (!file) return;

            if (!file.type.startsWith("image/")) {
                alert("Please select an image file");
                input.value = "";
                return;
            }

            selectedFile = file;
            const url = URL.createObjectURL(file);
            document.getElementById('preview-body').innerHTML = `<img src="${url}" alt="preview">`;
            document.getElementById('media-preview').style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('media-preview').style.display = 'none';
            document.getElementById('preview-body').innerHTML = '';
            document.getElementById('caption-input').value = '';
            document.getElementById('file-in').value = '';
            selectedFile = null;
        }

        function uploadWithCaption() {
            if (isBlocked) return alert("This chat is blocked");
            if (!authReady) return alert("Please wait a moment");
            if (!myPartnerID) return alert("Login first");
            if (!selectedFile) return alert("Choose an image first");

            const btn = document.getElementById('upload-btn');
            const cap = document.getElementById('caption-input').value.trim();
            const safeName = selectedFile.name.replace(/[^\w.\-]/g, "_");
            const path = `media/${myPartnerID}/${Date.now()}_${safeName}`;
            const ref = storage.ref().child(path);
            const localURL = URL.createObjectURL(selectedFile);
            const localUploadId = "upload_" + Date.now() + "_" + Math.random().toString(36).slice(2);

            uploadsById[localUploadId] = {
                id: localUploadId,
                localURL,
                caption: cap,
                fileSize: selectedFile.size,
                progress: 0,
                bytesTransferred: 0,
                totalBytes: selectedFile.size,
                startTime: Date.now(),
                replyToText: replyPreviewText || null
            };

            loadMessages();

            btn.disabled = true;
            btn.innerText = "...";

            const uploadTask = ref.put(selectedFile);

            uploadTask.on(
                "state_changed",
                (snapshot) => {
                    const percent = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
                    if (uploadsById[localUploadId]) {
                        uploadsById[localUploadId].progress = percent;
                        uploadsById[localUploadId].bytesTransferred = snapshot.bytesTransferred;
                        uploadsById[localUploadId].totalBytes = snapshot.totalBytes;
                        loadMessages();
                    }
                },
                (error) => {
                    console.error(error);
                    delete uploadsById[localUploadId];
                    loadMessages();
                    alert("Upload failed: " + error.message);
                    btn.disabled = false;
                    btn.innerText = ">";
                },
                () => {
                    uploadTask.snapshot.ref.getDownloadURL()
                        .then((url) => {
                            return db.ref('chats/' + myPartnerID).push({
                                content: url,
                                caption: cap,
                                type: 'img',
                                sender: 'me',
                                time: Date.now(),
                                seen: false,
                                delivered: true,
                                replyTo: replyMessageId || null,
                                replyToText: replyPreviewText || null,
                                deletedForEveryone: false,
                                fileSize: selectedFile.size,
                                fileName: selectedFile.name
                            });
                        })
                        .then(() => {
                            delete uploadsById[localUploadId];
                            loadMessages();
                            btn.disabled = false;
                            btn.innerText = ">";
                            closePreview();
                            cancelReply();
                        })
                        .catch((e) => {
                            console.error(e);
                            delete uploadsById[localUploadId];
                            loadMessages();
                            alert("Send failed: " + e.message);
                            btn.disabled = false;
                            btn.innerText = ">";
                        });
                }
            );
        }

        function openActionSheet() {
            document.getElementById('action-sheet').style.display = 'flex';
        }

        function closeActionSheet() {
            document.getElementById('action-sheet').style.display = 'none';
            activeActionMessageId = null;
            activeActionMessage = null;
        }

        function deleteForMe() {
            if (!activeActionMessageId) return;
            setLocalDeleted(activeActionMessageId);
            closeActionSheet();
            loadMessages();
        }

        function deleteForEveryone() {
            if (!activeActionMessageId || !myPartnerID) return;

            const isMine = activeActionMessage && activeActionMessage.sender === 'me';

            db.ref(`chats/${myPartnerID}/${activeActionMessageId}`).update({
                deletedForEveryone: true,
                deletedText: isMine ? "You deleted this message" : "This message was deleted",
                deletedAt: Date.now()
            }).then(() => {
                closeActionSheet();
            }).catch(err => {
                console.error(err);
                alert("Delete failed: " + err.message);
            });
        }

        function setReplyFromAction() {
            if (!activeActionMessage) return;

            let txt = "Message";
            if (activeActionMessage.deletedForEveryone) {
                txt = "Deleted message";
            } else if (activeActionMessage.type === 'img') {
                txt = activeActionMessage.caption || "Photo";
            } else {
                txt = activeActionMessage.content || "Message";
            }

            setReply(txt, activeActionMessageId);
            closeActionSheet();
        }

        function replyCare(ev, t) {
            ev.stopPropagation();
            if (isBlocked) return alert("This chat is blocked");

            db.ref('chats/' + myPartnerID).push({
                content: t,
                type: 'text',
                sender: 'me',
                time: Date.now(),
                seen: false,
                delivered: true,
                deletedForEveryone: false
            });
        }

        function triggerNuclearBomb() {
            if (!myPartnerID) return alert("Login first");
            if (!confirm("Delete all your sent messages for everyone?")) return;

            db.ref('chats/' + myPartnerID).once('value')
                .then(snap => {
                    const updates = {};
                    snap.forEach(c => {
                        const v = c.val();
                        if (v && v.sender === 'me') {
                            updates[c.key + '/deletedForEveryone'] = true;
                            updates[c.key + '/deletedText'] = "You deleted this message";
                            updates[c.key + '/deletedAt'] = Date.now();
                        }
                    });
                    return db.ref('chats/' + myPartnerID).update(updates);
                })
                .catch(err => {
                    console.error(err);
                    alert("Nuclear delete failed: " + err.message);
                });
        }
    </script>
</body>
</html>
