<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11LOTUS | Digital Sanctuary</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* පසුබිම් සජීවීකරණය */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            filter: blur(50px);
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #d4af37;
            letter-spacing: 12px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            font-size: 28px;
        }

        .id-display {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            border: 2px dashed rgba(212, 175, 55, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            position: relative;
        }

        .id-display::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid #d4af37;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: #d4af37;
            background: rgba(255,255,255,0.1);
            outline: none;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: #fff;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.8);
            transform: translateY(-2px);
        }

        .forgot {
            display: block;
            margin-top: 20px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }

        .forgot:hover { color: #d4af37; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <h1>11LOTUS</h1>
        
        <div class="id-display">
            <span style="font-size: 10px; color: #d4af37; letter-spacing: 2px;">SCANNING</span>
        </div>

        <input type="text" id="partner-id" placeholder="PARTNER ID">
        <input type="password" id="password" placeholder="SECRET PASSWORD">

        <button class="btn">Unlock Sanctuary</button>

        <a href="#" class="forgot">Lost access to your sanctuary?</a>
    </div>

</body>
</html>
