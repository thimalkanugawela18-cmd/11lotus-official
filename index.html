<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>11LOTUS | Souls Sanctuary PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap');
        
        :root { --gold: #d4af37; --dark: #0b0b0b; --bubble-me: #d4af37; --bubble-you: #202020; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--dark); color: #fff; 
            font-family: 'Rajdhani', sans-serif; height: 100%; width: 100%;
            overflow: hidden; /* Phone එකේ scroll වීම පාලනයට */
        }

        /* Main Chat Container */
        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; }
        .active { display: flex !important; }

        header { 
            width: 100%; padding: 15px; background: #111; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
        }

        /* Chat Window Area */
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 10px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* WhatsApp Wallpaper */
            background-blend-mode: overlay; background-color: var(--dark);
        }

        /* Message Bubbles - WhatsApp Style */
        .msg { 
            max-width: 75%; padding: 8px 12px; border-radius: 12px; 
            font-size: 15px; position: relative; word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        
        /* Computer එකේදී මැසේජ් පේන විදිහ */
        @media (min-width: 768px) {
            .msg { max-width: 40%; } /* Computer එකේදී පින්තූර ඕනෑවට වඩා ලොකු වෙන්නේ නැහැ */
        }

        .sent { align-self: flex-end; background: var(--bubble-me); color: #000; border-top-right-radius: 2px; }
        .rec { align-self: flex-start; background: var(--bubble-you); color: #fff; border-top-left-radius: 2px; }

        /* Images and Videos WhatsApp style */
        .msg img, .msg video { 
            max-width: 100%; border-radius: 8px; display: block; 
            margin-top: 5px; object-fit: contain;
        }

        /* Input Area - Fixed at Bottom */
        .input-area { 
            width: 100%; padding: 10px 15px; background: #181818; 
            display: flex; align-items: center; gap: 10px; box-sizing: border-box;
            padding-bottom: env(safe-area-inset-bottom); /* iPhone notch protection */
        }

        #chat-input { 
            flex: 1; padding: 10px 15px; background: #2a2a2a; border: none; 
            border-radius: 25px; color: #fff; outline: none; font-size: 16px;
        }

        .icon-btn { color: var(--gold); font-size: 22px; cursor: pointer; }

        /* Nuclear Explosion scene */
        #nuke-gif { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:80%; z-index:201; }
    </style>
</head>
<body>

    <div id="chat-screen" class="screen">
        <header>
            <div style="color:var(--gold); font-family:'Orbitron'; font-size:14px;">11LOTUS PRO</div>
            <button class="icon-btn" style="background:none; border:none;" onclick="triggerNuclearBomb()">💣</button>
        </header>

        <div id="chat-window"></div>

        <div class="input-area">
            <label class="icon-btn">📎<input type="file" id="file-in" hidden onchange="uploadMedia(this)"></label>
            <span class="icon-btn" id="mic-btn" onmousedown="startVoice()" onmouseup="stopVoice()">🎙️</span>
            <input type="text" id="chat-input" placeholder="Whisper something..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--gold); border:none; width:40px; height:40px; border-radius:50%; font-weight:bold;">></button>
        </div>
    </div>

    <img id="nuke-gif" src="https://i.ibb.co/L5kR2Q0/explosion.gif">

    <script>
        // Firebase Config and Chat Logic (කලින් තිබුණු විදිහටම තියෙන්න දෙන්න)
        // හැබැයි pushToDB එකේදී type එක 'img' නම්, display කරද්දී 'max-width: 100%' පාවිච්චි වෙනවා
        
        function loadMessages() {
            db.ref('chats/'+myPartnerID).on('value', snap => {
                const win = document.getElementById('chat-window');
                win.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    if(m.status !== 'nuked') {
                        const div = document.createElement('div');
                        div.className = "msg " + (m.sender === 'me' ? 'sent' : 'rec');
                        
                        let html = "";
                        if(m.type === 'text') html += m.content;
                        else if(m.type === 'img') html += `<img src="${m.content}" style="max-height:300px;">`;
                        else if(m.type === 'vid') html += `<video src="${m.content}" controls style="max-height:300px;"></video>`;
                        else if(m.type === 'voice') html += `<audio src="${m.content}" controls style="width:100%;"></audio>`;

                        div.innerHTML = html;
                        win.appendChild(div);
                    }
                });
                win.scrollTop = win.scrollHeight;
            });
        }
    </script>
</body>
</html>
