<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>11LOTUS | Souls Sanctuary PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@joypixels/emoji-button@4.6.2/dist/index.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap');
        :root { --gold: #d4af37; --dark: #0b0b0b; --bubble-me: #d4af37; --bubble-you: #202020; --blue: #4fc3f7; }
        
        body, html { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; }
        .active { display: flex !important; }

        /* Chat Layout */
        header { width: 100%; padding: 12px 15px; background: #111; border-bottom: 1px solid rgba(212, 175, 55, 0.3); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: var(--dark); }
        
        /* Messages & Swipe */
        .msg-container { position: relative; width: 100%; display: flex; flex-direction: column; transition: transform 0.2s; }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 15px; position: relative; word-wrap: break-word; line-height: 1.4; }
        @media (min-width: 768px) { .msg { max-width: 35%; } }
        .sent { align-self: flex-end; background: var(--bubble-me); color: #000; border-bottom-right-radius: 2px; }
        .rec { align-self: flex-start; background: var(--bubble-you); color: #fff; border-bottom-left-radius: 2px; }

        /* Ticks (✓✓) */
        .status-tick { font-size: 11px; margin-left: 5px; float: right; margin-top: 4px; opacity: 0.6; font-weight: bold; }
        .seen-tick { color: var(--blue); opacity: 1; }

        /* Media Preview Modal */
        #media-preview { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:5000; flex-direction:column; }
        #preview-body { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; }
        #preview-body img, #preview-body video { max-height:75vh; max-width:100%; border-radius:10px; }
        .preview-footer { padding:20px; background:rgba(0,0,0,0.8); display:flex; gap:10px; align-items:center; }

        /* Input Area */
        .input-area { width: 100%; padding: 10px 15px; background: #181818; display: flex; align-items: center; gap: 10px; }
        #chat-input { flex: 1; padding: 12px 18px; background: #2a2a2a; border: none; border-radius: 25px; color: #fff; outline: none; font-size: 16px; }
        .icon-btn { color: var(--gold); font-size: 24px; cursor: pointer; background:none; border:none; }

        .reply-ctx { background: rgba(0,0,0,0.1); border-left: 3px solid var(--gold); padding: 4px 8px; margin-bottom: 5px; border-radius: 4px; font-size: 12px; font-style: italic; opacity: 0.8; }
        #reply-bar { display: none; background: #1a1a1a; padding: 8px 15px; border-top: 1px solid var(--gold); align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div id="chat-screen" class="screen active">
        <header>
            <div style="color:var(--gold); font-family:'Orbitron'; font-size:14px; letter-spacing:2px;">11LOTUS SANCTUARY</div>
            <button class="icon-btn" onclick="triggerNuclearBomb()">💣</button>
        </header>
        
        <div id="chat-window"></div>

        <div id="reply-bar">
            <span id="reply-txt" style="flex:1; font-size:12px; color:#aaa;">Replying...</span>
            <button onclick="cancelReply()" style="background:none; border:none; color:var(--red);">X</button>
        </div>

        <div class="input-area">
            <button class="icon-btn" id="emoji-btn">😊</button>
            <label class="icon-btn">📎<input type="file" id="file-in" hidden onchange="openPreview(this)"></label>
            <span class="icon-btn" id="mic-btn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice()" ontouchend="stopVoice()">🎙️</span>
            <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--gold); border:none; width:45px; height:45px; border-radius:50%; font-weight:bold; cursor:pointer;">></button>
        </div>
    </div>

    <div id="media-preview">
        <div style="padding:15px;"><button onclick="closePreview()" style="color:#fff; background:none; border:none; font-size:24px;">X</button></div>
        <div id="preview-body"></div>
        <div class="preview-footer">
            <input type="text" id="caption-input" style="flex:1; padding:12px; border-radius:25px; border:none; background:#333; color:#fff;" placeholder="Add a caption...">
            <button onclick="uploadWithCaption()" style="background:var(--gold); border:none; width:50px; height:50px; border-radius:50%; font-weight:bold;">></button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAj1BdBnNkVUhW7Cn6muBm6hmGG59l_RsQ",
            authDomain: "lotus-official-4c28b.firebaseapp.com",
            databaseURL: "https://lotus-official-4c28b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lotus-official-4c28b",
            storageBucket: "lotus-official-4c28b.appspot.com",
            messagingSenderId: "584674732018",
            appId: "1:584674732018:web:b6e5fa13708eac51512d6b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();
        let myPartnerID = "LOTUS-01"; // ඔයාගේ ID එක මෙතනට එයි
        let rID = null, rTxt = "", selectedFile = null;

        // Emoji Picker
        const picker = new EmojiButton({ theme: 'dark', position: 'top-start' });
        picker.on('emoji', selection => document.getElementById('chat-input').value += selection.emoji);
        document.getElementById('emoji-btn').onclick = () => picker.togglePicker(document.getElementById('emoji-btn'));

        // Load Messages & Delivery Status
        function loadMessages() {
            db.ref('chats/'+myPartnerID).on('value', snap => {
                const win = document.getElementById('chat-window');
                win.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    if(m.status !== 'nuked') {
                        // Deliver Status (අනිත් කෙනා චැට් එක බලද්දී✓✓ වැටෙනවා)
                        if(m.sender !== 'me' && !m.seen) db.ref(`chats/${myPartnerID}/${child.key}`).update({seen: true});

                        const container = document.createElement('div');
                        container.className = "msg-container";
                        
                        // Swipe to Reply
                        let sX = 0;
                        container.ontouchstart = e => sX = e.touches[0].clientX;
                        container.ontouchend = e => { if(e.changedTouches[0].clientX - sX > 70) setReply(m.content || "Media", child.key); };

                        const div = document.createElement('div');
                        div.className = "msg " + (m.sender==='me' ? 'sent' : 'rec');
                        
                        let html = "";
                        if(m.replyTo) html += `<div class="reply-ctx">Replied: ${m.replyTo}</div>`;
                        
                        if(m.type==='text') html += m.content;
                        else if(m.type==='img') html += `<img src="${m.content}">${m.caption ? `<div style="font-size:13px; margin-top:5px;">${m.caption}</div>` : ''}`;
                        else if(m.type==='vid') html += `<video src="${m.content}" controls></video>${m.caption ? `<div style="font-size:13px; margin-top:5px;">${m.caption}</div>` : ''}`;
                        else if(m.type==='voice') html += `<audio src="${m.content}" controls></audio>`;
                        
                        // Ticks Logic
                        if(m.sender === 'me') {
                            let tickClass = m.seen ? "seen-tick" : "";
                            html += `<span class="status-tick ${tickClass}">${m.seen ? '✓✓' : '✓'}</span>`;
                        }

                        div.innerHTML = html;
                        container.appendChild(div);
                        win.appendChild(container);
                    }
                });
                win.scrollTop = win.scrollHeight;
            });
        }

        // Media Preview & Caption
        function openPreview(input) {
            selectedFile = input.files[0]; if(!selectedFile) return;
            const modal = document.getElementById('media-preview');
            const body = document.getElementById('preview-body');
            body.innerHTML = ""; modal.style.display = "flex";
            const url = URL.createObjectURL(selectedFile);
            body.innerHTML = selectedFile.type.startsWith('image') ? `<img src="${url}">` : `<video src="${url}" controls></video>`;
        }
        function closePreview() { document.getElementById('media-preview').style.display="none"; selectedFile=null; }

        function uploadWithCaption() {
            const cap = document.getElementById('caption-input').value;
            const ref = storage.ref(`media/${myPartnerID}/${Date.now()}`);
            ref.put(selectedFile).then(s => s.ref.getDownloadURL()).then(url => {
                db.ref('chats/'+myPartnerID).push({
                    content: url, caption: cap, type: selectedFile.type.startsWith('image')?'img':'vid',
                    sender: 'me', time: Date.now(), status: 'active', seen: false
                });
                closePreview();
            });
        }

        function sendMsg() {
            const i = document.getElementById('chat-input'); if(!i.value) return;
            db.ref('chats/'+myPartnerID).push({
                content: i.value, type: 'text', sender: 'me', time: Date.now(), status: 'active', 
                seen: false, replyTo: rID ? rTxt : null
            });
            i.value = ""; cancelReply();
        }

        function setReply(t, id) { rID=id; rTxt=t; document.getElementById('reply-bar').style.display='flex'; document.getElementById('reply-txt').innerText="Replying: "+t; }
        function cancelReply() { rID=null; document.getElementById('reply-bar').style.display='none'; }

        // Voice
        let mediaRec, audioChunks = [];
        async function startVoice() {
            const s = await navigator.mediaDevices.getUserMedia({audio:true});
            mediaRec = new MediaRecorder(s); mediaRec.start();
            audioChunks=[]; document.getElementById('mic-btn').style.color='red';
            mediaRec.ondataavailable = e => audioChunks.push(e.data);
        }
        function stopVoice() {
            if(!mediaRec) return; mediaRec.stop();
            document.getElementById('mic-btn').style.color='var(--gold)';
            mediaRec.onstop = () => {
                const b = new Blob(audioChunks, {type:'audio/webm'});
                storage.ref(`voice/${myPartnerID}/${Date.now()}`).put(b).then(s=>s.ref.getDownloadURL()).then(url=>{
                    db.ref('chats/'+myPartnerID).push({content:url, type:'voice', sender:'me', time:Date.now(), status:'active', seen:false});
                });
            };
        }

        function triggerNuclearBomb() {
            if(confirm("💣 Nuke your chat?")) {
                db.ref('chats/'+myPartnerID).once('value', snap => {
                    snap.forEach(c => { if(c.val().sender==='me') db.ref(`chats/${myPartnerID}/${c.key}`).update({status:'nuked'}); });
                });
            }
        }

        window.onload = loadMessages;
    </script>
</body>
</html>
