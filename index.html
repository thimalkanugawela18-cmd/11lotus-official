<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>11LOTUS | Souls Sanctuary FINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@joypixels/emoji-button@4.6.2/dist/index.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap');
        :root { --gold: #d4af37; --dark: #0b0b0b; --bubble-me: #d4af37; --bubble-you: #202020; --blue: #4fc3f7; }
        
        body, html { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; justify-content: center; align-items: center; }
        .active { display: flex !important; }

        /* Auth UI */
        .container { background: rgba(20, 20, 20, 0.95); padding: 35px; border-radius: 20px; border: 1px solid var(--gold); width: 85%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; border-radius: 8px; color: #fff; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-top: 10px; }

        /* Chat Layout */
        #chat-screen { justify-content: flex-start; align-items: stretch; }
        header { width: 100%; padding: 12px 15px; background: #111; border-bottom: 1px solid rgba(212, 175, 55, 0.3); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: var(--dark); }
        
        /* --- IMAGE SIZE LIMIT FIXED HERE --- */
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 15px; position: relative; word-wrap: break-word; line-height: 1.4; }
        .msg img { 
            max-width: 250px; 
            width: 100%; 
            border-radius: 8px; 
            display: block; 
            margin: 5px 0; 
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        @media (max-width: 480px) { .msg img { max-width: 200px; } }

        .sent { align-self: flex-end; background: var(--bubble-me); color: #000; border-bottom-right-radius: 2px; }
        .rec { align-self: flex-start; background: var(--bubble-you); color: #fff; border-bottom-left-radius: 2px; }
        
        .status-tick { font-size: 11px; margin-left: 5px; float: right; margin-top: 4px; opacity: 0.6; }
        .seen-tick { color: var(--blue); opacity: 1; }

        /* Input Area */
        .input-area { width: 100%; padding: 10px 15px; background: #181818; display: flex; align-items: center; gap: 10px; }
        #chat-input { flex: 1; padding: 12px; background: #2a2a2a; border: none; border-radius: 25px; color: #fff; outline: none; }
        .icon-btn { color: var(--gold); font-size: 24px; cursor: pointer; background:none; border:none; }

        /* Care Buttons */
        .care-btn { border: 1px solid var(--gold); background: none; color: var(--gold); border-radius: 15px; padding: 5px 12px; font-size: 12px; margin: 5px 2px; cursor: pointer; }

        /* Modals */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9000; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="container">
            <h1 style="font-family:'Orbitron'; color:var(--gold); letter-spacing:5px;">11LOTUS</h1>
            <input type="text" id="partner-id" placeholder="PARTNER ID">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="btn" onclick="handleAuth()">UNLOCK</button>
            <p onclick="showRecovery()" style="color:var(--gold); font-size:12px; cursor:pointer; margin-top:15px; text-decoration:underline;">Forgot Password?</p>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div class="container">
            <h2 style="color:var(--gold);">INITIALIZE</h2>
            <input type="password" id="new-pass" placeholder="Create Password">
            <input type="text" id="personal-key" placeholder="Recovery Key (Secret)">
            <button class="btn" onclick="saveUser()">START</button>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <header>
            <div style="color:var(--gold); font-family:'Orbitron';">11LOTUS SANCTUARY</div>
            <button class="icon-btn" onclick="triggerNuclearBomb()">💣</button>
        </header>
        <div id="chat-window"></div>
        <div class="input-area">
            <button class="icon-btn" id="emoji-btn">😊</button>
            <label class="icon-btn">📎<input type="file" id="file-in" hidden onchange="openPreview(this)"></label>
            <input type="text" id="chat-input" placeholder="Whisper..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--gold); border:none; width:45px; height:45px; border-radius:50%; font-weight:bold;">></button>
        </div>
    </div>

    <div id="media-preview" class="modal">
        <div style="position:absolute; top:20px; left:20px;"><button onclick="closePreview()" style="color:#fff; background:none; border:none; font-size:24px;">X</button></div>
        <div id="preview-body" style="flex:1; display:flex; align-items:center; justify-content:center; padding:20px;"></div>
        <div style="width:100%; padding:20px; background:rgba(0,0,0,0.8); display:flex; gap:10px;">
            <input type="text" id="caption-input" style="flex:1; padding:12px; border-radius:25px; border:none; background:#333; color:#fff;" placeholder="Add a caption...">
            <button onclick="uploadWithCaption()" style="background:var(--gold); border:none; width:50px; height:50px; border-radius:50%; font-weight:bold;">></button>
        </div>
    </div>

    <div id="recovery-modal" class="modal">
        <div class="container">
            <h3 style="color:var(--gold);">RECOVERY</h3>
            <input type="text" id="recover-key-input" placeholder="ENTER SECRET KEY">
            <input type="password" id="new-password-input" placeholder="NEW PASSWORD" style="display:none;">
            <button class="btn" id="recovery-btn" onclick="verifyRecoveryKey()">VERIFY KEY</button>
            <button class="btn" style="background:none; color:#888;" onclick="closeRecovery()">Cancel</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAj1BdBnNkVUhW7Cn6muBm6hmGG59l_RsQ",
            authDomain: "lotus-official-4c28b.firebaseapp.com",
            databaseURL: "https://lotus-official-4c28b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lotus-official-4c28b",
            storageBucket: "lotus-official-4c28b.appspot.com",
            messagingSenderId: "584674732018",
            appId: "1:584674732018:web:b6e5fa13708eac51512d6b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();
        let myPartnerID = "";
        let selectedFile = null;

        // Emoji
        const picker = new EmojiButton({ theme: 'dark' });
        picker.on('emoji', selection => document.getElementById('chat-input').value += selection.emoji);
        document.getElementById('emoji-btn').onclick = () => picker.togglePicker(document.getElementById('emoji-btn'));

        // Auth
        function handleAuth() {
            myPartnerID = document.getElementById('partner-id').value.trim();
            const p = document.getElementById('password').value;
            db.ref('users/'+myPartnerID).once('value', snap => {
                const u = snap.val();
                if(!u) showScreen('setup-screen');
                else if(u.password === p) { showScreen('chat-screen'); loadMessages(); }
                else alert("Wrong Password");
            });
        }
        function saveUser() {
            const p = document.getElementById('new-pass').value;
            const k = document.getElementById('personal-key').value;
            db.ref('users/'+myPartnerID).set({password:p, key:k}).then(() => { showScreen('chat-screen'); loadMessages(); });
        }

        // Forgot Pass
        function showRecovery() { document.getElementById('recovery-modal').style.display = 'flex'; }
        function closeRecovery() { document.getElementById('recovery-modal').style.display = 'none'; }
        function verifyRecoveryKey() {
            const id = document.getElementById('partner-id').value.trim();
            const key = document.getElementById('recover-key-input').value;
            db.ref('users/'+id).once('value', s => {
                if(s.val() && s.val().key === key) {
                    document.getElementById('recover-key-input').style.display = 'none';
                    document.getElementById('new-password-input').style.display = 'block';
                    document.getElementById('recovery-btn').innerText = "RESET PASSWORD";
                    document.getElementById('recovery-btn').onclick = resetPassword;
                } else alert("Invalid Key");
            });
        }
        function resetPassword() {
            const id = document.getElementById('partner-id').value.trim();
            const np = document.getElementById('new-password-input').value;
            db.ref('users/'+id).update({password:np}).then(() => location.reload());
        }

        // Chat
        function loadMessages() {
            db.ref('chats/'+myPartnerID).on('value', snap => {
                const win = document.getElementById('chat-window');
                win.innerHTML = "";
                let lastT = 0;
                snap.forEach(child => {
                    const m = child.val();
                    if(m.sender !== 'me' && !m.seen) db.ref(`chats/${myPartnerID}/${child.key}`).update({seen: true});
                    const div = document.createElement('div');
                    div.className = "msg " + (m.sender === 'me' ? 'sent' : 'rec');
                    
                    let html = "";
                    if(m.type==='img') html = `<img src="${m.content}">${m.caption ? `<div style="font-size:13px; margin-top:5px;">${m.caption}</div>` : ''}`;
                    else if(m.type==='care_check') html = `<div>${m.content}</div><button class="care-btn" onclick="replyCare('Good! 😊')">I'm Good</button><button class="care-btn" onclick="replyCare('I need a hug 🫂')">Hug me</button>`;
                    else html = m.content;

                    if(m.sender === 'me') html += `<span class="status-tick ${m.seen ? 'seen-tick' : ''}">${m.seen ? '✓✓' : '✓'}</span>`;
                    
                    div.innerHTML = html;
                    win.appendChild(div);
                    lastT = m.time;
                });
                win.scrollTop = win.scrollHeight;
                checkInactivity(lastT);
            });
        }

        function checkInactivity(lastT) {
            if(lastT > 0 && (Date.now() - lastT > 4 * 24 * 60 * 60 * 1000)) {
                const care = "It's been a bit quiet... Just checking in. ❤️";
                db.ref('chats/'+myPartnerID).limitToLast(1).once('value', s => {
                    let l = ""; s.forEach(c => l = c.val().content);
                    if(l !== care) db.ref('chats/'+myPartnerID).push({content:care, type:'care_check', sender:'11LOTUS', time:Date.now()});
                });
            }
        }

        function sendMsg() {
            const i = document.getElementById('chat-input');
            if(!i.value) return;
            db.ref('chats/'+myPartnerID).push({ content: i.value, type: 'text', sender: 'me', time: Date.now(), seen: false });
            i.value = "";
        }
        function replyCare(t) { db.ref('chats/'+myPartnerID).push({content:t, type:'text', sender:'me', time:Date.now()}); }

        // Media
        function openPreview(input) {
            selectedFile = input.files[0];
            const url = URL.createObjectURL(selectedFile);
            document.getElementById('preview-body').innerHTML = `<img src="${url}">`;
            document.getElementById('media-preview').style.display = "flex";
        }
        function closePreview() { document.getElementById('media-preview').style.display = "none"; }
        function uploadWithCaption() {
            const cap = document.getElementById('caption-input').value;
            const ref = storage.ref(`media/${myPartnerID}/${Date.now()}`);
            ref.put(selectedFile).then(s => s.ref.getDownloadURL()).then(url => {
                db.ref('chats/'+myPartnerID).push({ content: url, caption: cap, type: 'img', sender: 'me', time: Date.now(), seen: false });
                closePreview();
            });
        }

        function triggerNuclearBomb() {
            if(confirm("💣 Clear your chat?")) db.ref('chats/'+myPartnerID).once('value', snap => {
                snap.forEach(c => { if(c.val().sender==='me') db.ref(`chats/${myPartnerID}/${c.key}`).remove(); });
            });
        }
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
